body,body *{transition:background-color var(--tr),border-color var(--tr),color var(--tr)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

function applyTheme(mode){
  document.body.classList.toggle('theme-light', mode === 'light');
  document.getElementById('theme-toggle').textContent = mode === 'light' ? '☀️' : '🌙';
}
function toggleTheme(){
  const current = localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('igreen_theme', next);
  applyTheme(next);
}

  return def.onlyTeam ? [def.onlyTeam] : Object.keys(TEAMS);

function pathFor(team, setorKey, sub){ return `equipes/${team}/${setorKey}/${sub}/registros`; }

/* ============================================================
   3. RESOLUÇÃO DE ACESSO
   ============================================================ */
const ACCESS_PASSWORD = "iGreen2026"; // senha única de visualização — troque aqui quando quiser
let ELEVATED = null; // preenchido quando alguém faz login como responsável de área (só pra liberar upload)

function resolveAccess(email){
  email = (email||'').toLowerCase().trim();
  const isSuper = SUPERADMINS.includes(email);
  const access = {email, isSuper, teams:{}};
  Object.keys(TEAMS).forEach(teamKey=>{
    const team = TEAMS[teamKey];
    const isLead = team.lead === email;
    let setores = [];
    if(isSuper || isLead){
      setores = Object.keys(team.setores);
    } else {
      setores = Object.keys(team.setores).filter(sk => team.setores[sk].emails.includes(email));
    }
    if(isSuper || isLead || setores.length){
      access.teams[teamKey] = {lead:isLead, setores};
    }
  });
  return access;
}
function findDisplayName(email){
  email=(email||'').toLowerCase();
  for(const tk in TEAMS){
    for(const sk in TEAMS[tk].setores){
      const s = TEAMS[tk].setores[sk];
      const idx = s.emails.indexOf(email);
      if(idx>-1) return s.people[idx];
    }
  }
  return email;
}
function canUpload(teamKey, setorKey){
  if(!ELEVATED) return false;
  if(ELEVATED.isSuper) return true;
  const teamAccess = ELEVATED.teams[teamKey];
  if(!teamAccess) return false;
  return teamAccess.lead || teamAccess.setores.includes(setorKey);
}

/* ============================================================
   4. GATE DE SENHA (visualização) + LOGIN DE RESPONSÁVEL (inline no upload)
   ============================================================ */
function doGateLogin(){
  const pass = document.getElementById('gate-pass').value;
  const err = document.getElementById('gate-err');
  if(pass !== ACCESS_PASSWORD){
    err.textContent = 'Senha incorreta.';
    err.style.display='block';
    return;
  }
  sessionStorage.setItem('igreen_gate','ok');
  APP_BOOTSTRAPPED = true;
  enterApp();
}
function doGateLogout(){
  sessionStorage.removeItem('igreen_gate');
  auth.signOut();
  ELEVATED = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  buildNav();
  goPage('inicio');
}
function doInlineRespLogin(inputId){
  const email = document.getElementById(inputId+'-email').value.trim();
  const pass = document.getElementById(inputId+'-pass').value;
  const err = document.getElementById(inputId+'-err');
  err.style.display='none';
  auth.signInWithEmailAndPassword(email, pass).catch(e=>{
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display='block';
  });
}
function doRespLogout(){ auth.signOut(); }

let APP_BOOTSTRAPPED = false;
auth.onAuthStateChanged(user=>{
  if(user && user.email){
    ELEVATED = resolveAccess(user.email);
    ELEVATED.displayName = findDisplayName(user.email);
  } else {
    ELEVATED = null;
  }
  if(sessionStorage.getItem('igreen_gate')==='ok'){
    if(!APP_BOOTSTRAPPED){
      APP_BOOTSTRAPPED = true;
      enterApp();
    } else {
      goPage(CURRENT_PAGE || 'inicio'); // re-renderiza pra mostrar/ocultar upload conforme login
    }
  }
});

  'api_leads__leads':'📲',
  'devolutivas__devolutivas':'↩️', 'devolutivas__clickup':'📌', 'devolutivas__demandas':'➕',

  'faturamento__geral':'💵'
};
function tabIcon(pageId){ return TAB_ICONS[pageId] || '📄'; }

function buildNav(){
  const nav = document.getElementById('nav');
  let html = `<button class="nav-btn" onclick="goPage('inicio')" id="nb-inicio">🏠 Início</button>`;
  html += `<button class="nav-btn" onclick="goPage('upload')" id="nb-upload">📤 Upload</button>`;
  Object.keys(SETOR_DEFS).forEach(sk=>{
    const setor = SETOR_DEFS[sk];
    html += `<div class="nav-sec">${SETOR_ICONS[sk]||'📁'} ${setor.label}</div>`;
    setor.tabs.forEach(tab=>{
      const pageId = sk+'__'+tab.key;
      html += `<button class="nav-btn" onclick="goPage('${pageId}')" id="nb-${pageId}">${tabIcon(pageId)} ${tab.label}</button>`;
    });
  });
  nav.innerHTML = html;
}
function markActive(pageId){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nb-'+pageId);
  if(btn) btn.classList.add('active');
}
function findTabDef(pageId){
  const [setorKey, tabKey] = pageId.split('__');
  const setor = SETOR_DEFS[setorKey];
  if(!setor) return null;
  const tab = setor.tabs.find(t=>t.key===tabKey);
  if(!tab) return null;
  return {setorKey, tab, setorLabel:setor.label};
}

/* ============================================================
   6. ROUTER
   ============================================================ */
let ACTIVE_LISTENERS = [];
let PAGE_GEN = 0; // incrementado a cada navegação — evita que um listener antigo (de uma aba que já foi trocada) atualize a tela errada
function clearListeners(){ ACTIVE_LISTENERS.forEach(u=>u()); ACTIVE_LISTENERS=[]; }

function goPage(pageId){
  try{
    clearListeners();
    PAGE_GEN++;
    CURRENT_PAGE = pageId;
    markActive(pageId);
    if(pageId === 'inicio'){ renderHome(); return; }
    if(pageId === 'upload'){ renderUploadPage(); return; }
    const found = findTabDef(pageId);
    const c = document.getElementById('page-container');
    if(!found){ c.innerHTML = '<div class="placeholder">Página não encontrada.</div>'; return; }
    const {setorKey, tab, setorLabel} = found;
    if(SETOR_DEFS[setorKey].underConstruction){
      c.innerHTML = `<div class="pg-title">${tab.label}</div><div class="pg-sub">// ${setorLabel}</div>
        <div class="placeholder" style="padding:60px;font-size:15px">🚧 Página em construção</div>`;
      return;
    }
    const teams = teamsForSetor(setorKey);
    if(tab.kind === 'conciliadas'){
      renderConciliadasPage(setorKey, tab, setorLabel, teams);
    } else {
      renderTabPage(setorKey, tab, setorLabel, teams);
    }
  }catch(err){
    console.error('Erro ao abrir página:', err);
    const c = document.getElementById('page-container');
    if(c) c.innerHTML = `<div class="placeholder">Não foi possível abrir esta aba agora (${err.message}). Tente clicar novamente ou atualizar a página.</div>`;
  }
}

async function handleClear(path, statusElId){
  if(!confirm('Apagar TODOS os registros desta aba (todo o histórico)? Essa ação não pode ser desfeita.')) return;
  const status = document.getElementById(statusElId);
  if(status) status.textContent = 'Apagando...';
  UPLOAD_IN_PROGRESS = true;
  try{
    await replaceCollection(path, []);
    if(status) status.textContent = 'Dados apagados.';
  }catch(err){
    if(status) status.textContent = 'Erro ao apagar: '+err.message;
  }finally{
    UPLOAD_IN_PROGRESS = false;
    if(CURRENT_PAGE !== 'upload') drawPage();
  }
}

function handleUpload(inputId, path){
  const input = document.getElementById(inputId);
  const status = document.getElementById(inputId+'-status');
  if(!input.files.length){ status.textContent='Escolha um arquivo primeiro.'; return; }
  status.textContent = 'Lendo arquivo...';
  const reader = new FileReader();
  reader.onload = async function(e){
    UPLOAD_IN_PROGRESS = true;
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ status.textContent='Planilha vazia.'; return; }
      status.textContent = `Enviando ${rows.length} linhas...`;
      await appendCollection(path, rows);
      status.textContent = `${rows.length} linhas adicionadas ao histórico.`;
    }catch(err){
      console.error(err);
      status.textContent = 'Erro ao enviar: '+err.message;
    }finally{
      UPLOAD_IN_PROGRESS = false;
      if(CURRENT_PAGE !== 'upload') drawPage(); // redesenha a tela já com os dados novos, sem precisar de F5
    }
  };
  reader.readAsArrayBuffer(input.files[0]);
}

async function replaceCollection(path, rows){
  const col = db.collection(path);
  const old = await col.get();
  let batch = db.batch(); let opCount = 0;
  for(const d of old.docs){ batch.delete(d.ref); opCount++; if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; } }
  if(opCount>0){ await batch.commit(); batch=db.batch(); opCount=0; }
  for(const row of rows){
    batch.set(col.doc(), {...row, _uploadedAt: firebase.firestore.FieldValue.serverTimestamp(), _uploadedBy: ELEVATED ? ELEVATED.email : 'desconhecido'});
    opCount++;
    if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; }
  }
  if(opCount>0) await batch.commit();
}
// não apaga nada — só adiciona as linhas novas por cima do que já existe (histórico acumulado)
async function appendCollection(path, rows){
  const col = db.collection(path);
  let batch = db.batch(); let opCount = 0;
  for(const row of rows){
    batch.set(col.doc(), {...row, _uploadedAt: firebase.firestore.FieldValue.serverTimestamp(), _uploadedBy: ELEVATED ? ELEVATED.email : 'desconhecido'});
    opCount++;
    if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; }
  }
  if(opCount>0) await batch.commit();
}
// apaga só os registros de uma data específica (usa a mesma coluna de data detectada nos filtros)
async function clearByDate(path, dateStr, statusElId){
  const status = document.getElementById(statusElId);
  if(status) status.textContent = 'Apagando registros do dia '+dateStr+'...';
  UPLOAD_IN_PROGRESS = true;
  try{
    const snap = await db.collection(path).get();
    const dateField = detectDateField(snap.docs.map(d=>d.data()));
    if(!dateField){ if(status) status.textContent = 'Não encontrei uma coluna de data nesta aba.'; return; }
    const target = new Date(dateStr).toDateString();
    let batch = db.batch(); let opCount = 0; let n = 0;
    snap.docs.forEach(d=>{
      const raw = d.data()[dateField];
      const dt = toJsDate(raw);
      if(dt && !isNaN(dt.getTime()) && dt.toDateString()===target){
        batch.delete(d.ref); opCount++; n++;
      }
    });
    if(opCount>0) await batch.commit();
    if(status) status.textContent = `${n} registro(s) do dia ${dateStr} apagado(s).`;
  }catch(err){
    if(status) status.textContent = 'Erro ao apagar: '+err.message;
  }finally{
    UPLOAD_IN_PROGRESS = false;
    if(CURRENT_PAGE !== 'upload') drawPage();
  }
}

function sheetNameMatches(sheetNames, wanted){
  const wn = normalizeStr(wanted);
  return sheetNames.find(sn=>normalizeStr(sn)===wn) || sheetNames.find(sn=>normalizeStr(sn).includes(wn)) || null;
}

function slugFile(s){ return s.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]+/g,'_').replace(/^_|_$/g,''); }

function buildInstrucoesRows(setorKey, setorLabel, tabs){

function buildTemplateWorkbook(setorKey, tabs){
  const setorLabel = SETOR_DEFS[setorKey].label;
  const wb = XLSX.utils.book_new();
  const wsInstr = XLSX.utils.aoa_to_sheet(buildInstrucoesRows(setorKey, setorLabel, tabs));
  wsInstr['!cols'] = [{wch:36},{wch:95}];
  XLSX.utils.book_append_sheet(wb, wsInstr, 'INSTRUÇÕES');
  tabs.forEach(tab=>{
    const ws = XLSX.utils.aoa_to_sheet([tab.template]);
    ws['!cols'] = tab.template.map(h=>({wch: Math.max(16, Math.min(34, h.length+6))}));
    XLSX.utils.book_append_sheet(wb, ws, (tab.sheet||tab.label).substring(0,31));
  });
  return wb;
}

   ============================================================ */
// Converte com segurança qualquer formato de data que possa aparecer num registro:
// Timestamp do Firestore, objeto Date (upload novo), texto ou número (uploads antigos).
function toJsDate(v){
  if(v == null || v === '') return null;
  if(typeof v.toDate === 'function') return v.toDate(); // Timestamp do Firestore
  if(v instanceof Date) return isNaN(v.getTime()) ? null : v;
  const d = new Date(v);
  return isNaN(d.getTime()) ? null : d;
}
function normalizeStr(s){
  return (s||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function fieldMatches(key, cand){
  const k = normalizeStr(key), c = normalizeStr(cand);
  if(c.length<=3) return new RegExp('\\b'+c+'\\b').test(k); // termos curtos ("id","uc") exigem palavra inteira
  return k.includes(c);
}
function detectField(row, candidates){
  const keys = Object.keys(row);
  // 1ª passada: prioriza colunas que COMEÇAM com a palavra-chave (evita "STATUS FORNECEDORA" ganhar de "FORNECEDORA")
  for(const cand of candidates){
    const c = normalizeStr(cand);
    const hit = keys.find(k=>normalizeStr(k).startsWith(c));
    if(hit) return hit;
  }
  // 2ª passada: substring em qualquer posição (fallback mais permissivo)
  for(const cand of candidates){
    const hit = keys.find(k=>fieldMatches(k, cand));
    if(hit) return hit;
  }
  return null;
}
function barsHTML(counts){
  const keys = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const max = Math.max(...Object.values(counts), 1);
  return keys.map(k=>{
    const pct = Math.round((counts[k]/max)*100);
    return `<div class="bar-row"><div class="lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${counts[k]}</div></div>`;
  }).join('');
}
function tableHTML(rows, wrapId){
  if(!rows.length) return `<div class="placeholder">Nenhum dado ainda. Envie a planilha acima para começar.</div>`;
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_')).slice(0,10);
  let html = '<table><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  rows.slice(0,300).forEach(r=>{
    html += '<tr>'+cols.map(c=>`<td>${r[c]!==undefined?r[c]:''}</td>`).join('')+'</tr>';
  });
  html += '</tbody></table>';
  return html;
}

   9. MÉTRICAS ESPECÍFICAS POR ABA — descrições e KPIs sob medida
   ============================================================ */
function fmtNum(n){ return (n||0).toLocaleString('pt-BR'); }
function toNumber(v){
  if(v===undefined||v===null||v==='') return 0;
  if(typeof v === 'number') return v;
  const s = String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function mCount(label){ return {label, type:'kpi', color:'', compute:(rows)=>({label, value:fmtNum(rows.length)})}; }
function mSum(label, candidates, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:'—'};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const total = rows.reduce((a,r)=>a+toNumber(r[f]),0);
  return {label, value: fmtNum(total)};
}}; }
function mDistinctCount(label, candidates, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:0};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const set = new Set(rows.map(r=>String(r[f]||'').trim()).filter(Boolean));
  return {label, value:fmtNum(set.size)};
}}; }
function mKeyword(label, candidates, keywords, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:0};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const n = rows.filter(r=>{ const v=normalizeStr(r[f]); return keywords.some(k=>v.includes(normalizeStr(k))); }).length;
  return {label, value:fmtNum(n)};
}}; }
// conta pela "FAIXA DE ATRASO" (ex.: "0-30","61-90","+90 dias") pegando o maior número do texto
function mFaixaAbove(label, threshold, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:0};
  const f = detectField(rows[0], ['faixa de atraso','faixa']);
  if(!f) return {label, value:'—'};
  const n = rows.filter(r=>{
    const nums = String(r[f]||'').match(/\d+/g);
    if(!nums) return false;
    return Math.max(...nums.map(Number)) >= threshold;
  }).length;
  return {label, value:fmtNum(n)};
}}; }
function mDivergencia(){ return {label:'Divergências identificadas', type:'kpi', color:'red', compute:(rows)=>{
  if(!rows.length) return {label:'Divergências identificadas', value:0};
  // planilha real usa "AÇÃO CONCILIAÇÃO": CADASTRO OK = sem problema, qualquer outro valor = divergência
  const acaoField = detectField(rows[0], ['acao conciliacao','acao','tratativa']);
  if(acaoField){
    const n = rows.filter(r=>{ const v = normalizeStr(r[acaoField]).trim(); return v && v!=='cadastro ok' && v!=='ok'; }).length;
    return {label:'Divergências identificadas', value:fmtNum(n)};
  }
  const f = detectField(rows[0], ['diverg']);
  if(!f) return {label:'Divergências identificadas', value:'—'};
  let n = 0;
  rows.forEach(r=>{ const v=String(r[f]||'').toLowerCase(); if(v && v!=='ok' && v!=='0' && v!=='false' && v!=='não' && v!=='nao') n++; });
  return {label:'Divergências identificadas', value:fmtNum(n)};
}}; }
function mChart(label, candidates, limit=8){ return {label, type:'chart', compute:(rows)=>{
  if(!rows.length) return {label, counts:{}};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, counts:{}};
  const counts = {};
  rows.forEach(r=>{ const v = (r[f]||'—').toString().trim() || '—'; counts[v] = (counts[v]||0)+1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,limit);
  const obj = {}; top.forEach(([k,v])=>obj[k]=v);
  return {label, counts:obj};
}}; }

function chartsHTML(specs, rows){

function donutHTML(counts, colors){
  const entries = Object.entries(counts);
  const total = entries.reduce((a,[,v])=>a+v,0) || 1;
  let acc = 0;
  const stops = entries.map(([k,v],i)=>{
    const start = (acc/total)*360; acc += v;
    const end = (acc/total)*360;
    return `${colors[i%colors.length]} ${start}deg ${end}deg`;
  }).join(',');
  const legend = entries.map(([k,v],i)=>`<div class="li"><span class="sw" style="background:${colors[i%colors.length]}"></span>${k} — ${fmtNum(v)}</div>`).join('');
  return `<div class="donut-wrap"><div class="donut" style="background:conic-gradient(${stops})"></div><div class="donut-legend">${legend}</div></div>`;
}
const DONUT_COLORS = ['#38b450','#4FC3F7','#c8a832','#7060c0','#c84040','#c87028'];

/* ============================================================
   10. FILTROS (ID do cliente, colaborador, data) — usados em todas as abas
   ============================================================ */
function detectDateField(rows){ return rows.length ? detectField(rows[0], ['data','dt_','periodo','competenc']) : null; }
function detectColabField(rows){ return rows.length ? detectField(rows[0], ['colaborador','responsavel','analista','usuario','atendente']) : null; }
function detectIdField(rows){ return rows.length ? detectField(rows[0], ['id cliente','codigo cliente','id','cliente','uc','cpf','cnpj','codigo']) : null; }

let FILTER_STATE = {}; // guarda o filtro atual por escopo ('team'/'forn'), pra não resetar a cada atualização em tempo real
function resetFilterState(){ FILTER_STATE = {}; }

function filterBarHTML(rows, scope){
  const colabField = detectColabField(rows);
  const colabs = colabField ? [...new Set(rows.map(r=>r[colabField]).filter(Boolean))].sort() : [];
  const dateField = detectDateField(rows);
  const hasDate = !!dateField;

  if(!FILTER_STATE[scope]) FILTER_STATE[scope] = {id:'', colab:'', de:'', ate:'', dateTouched:false};
  const st = FILTER_STATE[scope];

  return `<div class="filter-bar">
    <span class="flbl">🔎</span>
    <input class="s-input" type="text" id="flt-id-${scope}" placeholder="Buscar ID do cliente..." value="${st.id||''}" oninput="onFilterChange('${scope}')" style="width:180px">
    ${colabField ? `<span class="flbl">👤 Colaborador:</span><select class="sel" id="flt-colab-${scope}" onchange="onFilterChange('${scope}')">
      <option value="">Todos</option>${colabs.map(c=>`<option value="${c}" ${st.colab===c?'selected':''}>${c}</option>`).join('')}</select>` : ''}
    ${hasDate ? `<span class="flbl">📅 Data:</span>
      <input class="s-input" type="date" id="flt-de-${scope}" value="${st.de||''}" onchange="onFilterChange('${scope}')">
      <span class="flbl">até</span>
      <input class="s-input" type="date" id="flt-ate-${scope}" value="${st.ate||''}" onchange="onFilterChange('${scope}')">
      ${st.de || st.ate ? `<button class="btn" style="font-size:10px;padding:3px 8px" onclick="clearDateFilter('${scope}')">🕓 Ver tudo (limpar data)</button>` : ''}
      ${st.de && st.ate && st.de===st.ate ? `<span class="tag">mostrando só ${st.de.split('-').reverse().join('/')}</span>` : ''}` : ''}
  </div>`;
}
function clearDateFilter(scope){
  FILTER_STATE[scope].de = ''; FILTER_STATE[scope].ate = ''; FILTER_STATE[scope].dateTouched = true;
  drawPage();
}
function applyFilters(rows, scope){
  const idEl = document.getElementById('flt-id-'+scope);
  const colabEl = document.getElementById('flt-colab-'+scope);
  const deEl = document.getElementById('flt-de-'+scope);
  const ateEl = document.getElementById('flt-ate-'+scope);
  let out = rows;
  const idVal = idEl ? idEl.value.trim().toLowerCase() : '';
  if(idVal){
    const idField = detectIdField(rows);
    out = out.filter(r => idField ? String(r[idField]||'').toLowerCase().includes(idVal) : JSON.stringify(r).toLowerCase().includes(idVal));
  }
  const colabVal = colabEl ? colabEl.value : '';
  if(colabVal){
    const colabField = detectColabField(rows);
    if(colabField) out = out.filter(r => String(r[colabField]||'') === colabVal);
  }
  const deVal = deEl ? deEl.value : '';
  const ateVal = ateEl ? ateEl.value : '';
  if(deVal || ateVal){
    const dateField = detectDateField(rows);
    if(dateField){
      out = out.filter(r=>{
        const raw = r[dateField];
        const d = toJsDate(raw);
        if(!d || isNaN(d.getTime())) return true;
        if(deVal && d < new Date(deVal)) return false;
        if(ateVal && d > new Date(ateVal)) return false;
        return true;
      });
    }
  }
  return out;
}
function onFilterChange(scope){
  const idEl = document.getElementById('flt-id-'+scope);
  const colabEl = document.getElementById('flt-colab-'+scope);
  const deEl = document.getElementById('flt-de-'+scope);
  const ateEl = document.getElementById('flt-ate-'+scope);
  FILTER_STATE[scope] = {
    id: idEl ? idEl.value : '',
    colab: colabEl ? colabEl.value : '',
    de: deEl ? deEl.value : '',
    ate: ateEl ? ateEl.value : '',
    dateTouched: true
  };
  drawPage();
}

/* ============================================================
   11. MOTOR DE NAVEGAÇÃO EM CAMADAS — visão geral → equipe → fornecedora
   Usado por TODAS as abas (genéricas e Bases Conciliadas)
   ============================================================ */
let PAGE = null; // {pageId, setorKey, tab, setorLabel, teams, rowsByTeam, view, team, fornecedora}

let UPLOAD_IN_PROGRESS = false; // enquanto true, pausamos redesenhos automáticos (evita perder o input/status no meio do envio)

function renderTabPage(setorKey, tab, setorLabel, teams){
  resetFilterState();
  PAGE = {pageId: setorKey+'__'+tab.key, setorKey, tab, setorLabel, teams, rowsByTeam:{}, view: teams.length===1?'team':'overview', team: teams.length===1?teams[0]:null, fornecedora:null};
  const gen = PAGE_GEN; // trava a geração — se o usuário já trocou de aba, esse listener vira no-op
  teams.forEach(team=>{
    const path = pathFor(team, setorKey, tab.sub);
    const unsub = db.collection(path).limit(5000).onSnapshot(snap=>{
      if(gen !== PAGE_GEN) return; // aba já foi trocada, ignora este retorno tardio
      PAGE.rowsByTeam[team] = snap.docs.map(d=>d.data());
      if(UPLOAD_IN_PROGRESS) return; // não redesenha no meio de um upload — evita perder a caixa de upload
      try{ drawPage(); }catch(err){ console.error('Erro ao desenhar página:', err); }
    }, err=>{
      if(gen !== PAGE_GEN) return;
      const c = document.getElementById('page-container');
      if(c) c.innerHTML = '<div class="placeholder">Erro ao carregar: '+err.message+'</div>';
    });
    ACTIVE_LISTENERS.push(unsub);
  });
  drawPage();
}
function renderConciliadasPage(setorKey, tab, setorLabel, teams){ renderTabPage(setorKey, tab, setorLabel, teams); }

function drawPage(){
  if(!PAGE) return;
  const c = document.getElementById('page-container');
  try{
    if(PAGE.view === 'fornecedora'){ drawFornecedoraView(c); return; }
    if(PAGE.view === 'team'){ drawTeamView(c); return; }
    drawOverviewView(c);
  }catch(err){
    console.error('Erro ao desenhar página:', err);
    if(c) c.innerHTML = `<div class="placeholder">Erro ao exibir os dados desta aba (${err.message}). Tente abrir a aba novamente.</div>`;
  }
}

function drawOverviewView(c){
  const {pageId, tab, setorLabel, teams, rowsByTeam} = PAGE;
  const meta = metricsFor(pageId);
  const combined = teams.reduce((acc,t)=>acc.concat(rowsByTeam[t]||[]), []);
  const teamCounts = {}; teams.forEach(t=>teamCounts[TEAMS[t].label] = (rowsByTeam[t]||[]).length);

  c.innerHTML = `
    <div class="pg-title">${tabIcon(pageId)} ${tab.label}</div>
    <div class="pg-sub">// ${setorLabel} · visão geral combinada — Equipe Paulo + Equipe Andressa</div>
    ${meta.desc ? `<div class="tab-desc">📋 ${meta.desc}</div>` : ''}
    <div class="kpi-row">${meta.kpis.map(k=>kpiHTML(k, combined)).join('')}</div>
    ${teams.length>1 ? `<div class="chart-block"><div class="chart-title">🥧 Participação por equipe</div>${donutHTML(teamCounts, DONUT_COLORS)}</div>` : ''}
    ${chartsHTML(meta.charts, combined)}
    <div class="section-hd">👥 Selecione uma equipe para ver o detalhamento<span class="line"></span></div>
    <div class="card-grid">
      ${teams.map(t=>`<div class="f-card" onclick="openTeamView('${t}')">
        <div class="name">👤 ${TEAMS[t].label}</div>
        <div class="n">${(rowsByTeam[t]||[]).length}</div>
        <div class="l">registros</div>
      </div>`).join('')}
    </div>`;
}

function openTeamView(team){ resetFilterState(); PAGE.view='team'; PAGE.team=team; drawPage(); }
function backToOverview(){ resetFilterState(); PAGE.view='overview'; PAGE.team=null; drawPage(); }

function drawTeamView(c){
  const {pageId, setorKey, tab, teams, rowsByTeam, team} = PAGE;
  const meta = metricsFor(pageId);
  const allRows = rowsByTeam[team] || [];
  const scope = 'team';
  const filtered = applyFilters(allRows, scope);
  const inputId = 'up-'+setorKey+'-'+tab.key+'-'+team;
  const showBack = teams.length > 1;
  const uploadHtml = SETOR_DEFS[setorKey].multiSheet
    ? uploadBoxMultiHTML(team, setorKey, inputId, pathFor(team, setorKey, tab.sub), tab.label)
    : uploadBoxHTML(team, setorKey, pathFor(team, setorKey, tab.sub), inputId);

  const fField = filtered.length ? detectField(filtered[0], ['fornecedor','supplier']) : null;
  const cardsHTML = TEAMS[team].fornecedoras.map(f=>{
    const n = fField ? filtered.filter(r=>{ const v=(r[fField]||'').toString().toUpperCase(); return v.includes(f) || f.includes(v); }).length : 0;
    return `<div class="f-card" onclick="openFornecedoraView('${encodeURIComponent(f)}')">
      <div class="name">🏢 ${f}</div><div class="n">${n}</div><div class="l">clientes</div>
    </div>`;
  }).join('');

  c.innerHTML = `
    ${showBack ? `<button class="back-btn" onclick="backToOverview()">← Voltar para visão geral</button>` : ''}
    <div class="pg-title">${tabIcon(pageId)} ${tab.label} — ${TEAMS[team].label}</div>
    <div class="pg-sub">// visão geral dessa equipe</div>
    ${meta.desc ? `<div class="tab-desc">📋 ${meta.desc}</div>` : ''}
    ${filterBarHTML(allRows, scope)}
    ${templateButtonHTML(setorKey, tab)}
    ${uploadHtml}
    <div class="kpi-row">${meta.kpis.map(k=>kpiHTML(k, filtered)).join('')}</div>
    ${chartsHTML(meta.charts, filtered)}
    <div class="section-hd">🏢 Por fornecedora<span class="line"></span></div>
    <div class="card-grid">${cardsHTML}</div>`;
}

function openFornecedoraView(fornecedoraEnc){ resetFilterState(); PAGE.view='fornecedora'; PAGE.fornecedora=decodeURIComponent(fornecedoraEnc); drawPage(); }
function backToTeam(){ resetFilterState(); PAGE.view='team'; PAGE.fornecedora=null; drawPage(); }

function drawFornecedoraView(c){
  const {pageId, tab, rowsByTeam, team, fornecedora} = PAGE;
  const meta = metricsFor(pageId);
  const allRows = rowsByTeam[team] || [];
  const fField = allRows.length ? detectField(allRows[0], ['fornecedor','supplier']) : null;
  const scopedRows = fField ? allRows.filter(r=>{ const v=(r[fField]||'').toString().toUpperCase(); return v.includes(fornecedora) || fornecedora.includes(v); }) : [];
  const scope = 'forn';
  const filtered = applyFilters(scopedRows, scope);

  c.innerHTML = `
    <button class="back-btn" onclick="backToTeam()">← Voltar para ${TEAMS[team].label}</button>
    <div class="pg-title">🏢 ${fornecedora}</div>
    <div class="pg-sub">// ${tabIcon(pageId)} ${tab.label} — ${TEAMS[team].label}</div>
    ${filterBarHTML(scopedRows, scope)}
    <div class="kpi-row">${meta.kpis.map(k=>kpiHTML(k, filtered)).join('')}</div>
    ${chartsHTML(meta.charts, filtered)}
    <div class="tbl-wrap">${tableHTML(filtered)}</div>`;
}

/* ============================================================
   12. INÍCIO — banner, acesso rápido e ranking por equipe
   ============================================================ */
const RANKING_SOURCES = [
  {setorKey:'atraso_injecao', sub:'clientes_atraso', weight:1},
  {setorKey:'atraso_injecao', sub:'entrando_atraso', weight:2},
  {setorKey:'atraso_injecao', sub:'represados', weight:4},
  {setorKey:'bases', sub:'cancelados', weight:3},
  {setorKey:'boletos_api', sub:'erros_api', weight:3}
];

/* ============================================================
   PÁGINA DE UPLOAD — um card por setor (não precisa repetir o
   mesmo arquivo em cada aba, já que uma planilha alimenta todas)
   ============================================================ */
function renderUploadPage(){
  const c = document.getElementById('page-container');
  const cardsHtml = Object.keys(SETOR_DEFS).filter(sk=>!SETOR_DEFS[sk].underConstruction).map(sk=>{
    const setor = SETOR_DEFS[sk];
    const teams = teamsForSetor(sk);
    const subTabsList = setor.tabs.map(t=>t.label).join(' · ');
    const teamsHtml = teams.map(team=>{
      const inputId = 'upload-page-'+sk+'-'+team;
      const box = setor.multiSheet
        ? uploadBoxMultiHTML(team, sk, inputId, null, null)
        : uploadBoxHTML(team, sk, pathFor(team, sk, setor.tabs[0].sub), inputId);
      return `<div style="margin-top:10px">
        <div class="tag" style="display:block;margin-bottom:6px">${TEAMS[team].label}</div>
        ${box}
      </div>`;
    }).join('');
    return `<div class="team-block" style="margin-bottom:20px">
      <div class="team-block-hd"><span>${SETOR_ICONS[sk]||'📁'} ${setor.label}</span></div>
      <div class="tag" style="display:block;margin-bottom:10px">Abas incluídas nesta planilha: ${subTabsList}</div>
      ${templateButtonHTML(sk, setor.tabs[0])}
      ${teamsHtml}
    </div>`;
  }).join('');

  c.innerHTML = `
    <div class="pg-title">📤 Upload central de planilhas</div>
    <div class="pg-sub">// envie o arquivo do setor uma única vez — ele já alimenta todas as abas relacionadas</div>
    <div class="tab-desc">📋 Cada card abaixo corresponde a um setor. A planilha desse setor já tem todas as abas internas necessárias — não precisa subir o mesmo arquivo dentro de cada aba individualmente.</div>
    <div class="card-grid" style="grid-template-columns:1fr">
      ${cardsHtml}
    </div>`;
}

function renderHome(){
  const c = document.getElementById('page-container');
  let quickHtml = '';
  Object.keys(SETOR_DEFS).forEach(sk=>{
    const setor = SETOR_DEFS[sk];
    setor.tabs.forEach(tab=>{
      const pageId = sk+'__'+tab.key;
      quickHtml += `<button class="quick-btn" onclick="goPage('${pageId}')">
        <div class="lbl">${tabIcon(pageId)} ${tab.label}</div><div class="setor">${SETOR_ICONS[sk]||'📁'} ${setor.label}</div>
      </button>`;
    });
  });

  c.innerHTML = `
    <div class="home-banner">
      <div>
        <div class="t">🌿 Monitoramento de Fornecedoras</div>
        <div class="s">📡 Visão executiva · dados em tempo real via Firestore</div>
      </div>
      <button class="btn btn-primary" onclick="loadRanking()">🔄 Atualizar ranking</button>
    </div>
    <div class="section-hd">⚡ Acesso rápido<span class="line"></span></div>
    <div class="quick-grid">${quickHtml}</div>
    <div class="section-hd">🏆 Ranking de fornecedoras — por equipe<span class="line"></span></div>
    <div class="tag" style="display:block;margin-bottom:14px">📉 Menor pontuação = melhor desempenho · soma divergências, atrasos e cancelamentos</div>
    <div class="rank-cols" id="rank-cols"><div class="placeholder">Carregando ranking...</div></div>`;
  loadRanking();
}

async function fetchCountsByFornecedora(team, setorKey, sub){
  const path = pathFor(team, setorKey, sub);
  try{
    const snap = await db.collection(path).limit(5000).get();
    const rows = snap.docs.map(d=>d.data());
    if(!rows.length) return {};
    const fField = detectField(rows[0], ['fornecedor','supplier']);
    const counts = {};
    rows.forEach(r=>{
      const f = fField ? (r[fField]||'').toString().toUpperCase() : '';
      if(f) counts[f] = (counts[f]||0)+1;
    });
    return counts;
  }catch(e){ return {}; }
}

let RANKING_LOADING = false;
async function loadRanking(){
  if(RANKING_LOADING) return; // já tem uma busca em andamento, ignora clique duplicado
  RANKING_LOADING = true;
  const el = document.getElementById('rank-cols');
  if(!el){ RANKING_LOADING = false; return; }
  el.innerHTML = '<div class="placeholder">Carregando ranking...</div>';

  try{
    const teamScores = {};
    for(const team of Object.keys(TEAMS)){
      const scores = {};
      TEAMS[team].fornecedoras.forEach(f=>scores[f]=0);
      // busca as 5 fontes em paralelo (muito mais rápido que sequencial)
      const results = await Promise.all(RANKING_SOURCES.map(src=>fetchCountsByFornecedora(team, src.setorKey, src.sub)));
      results.forEach((counts, i)=>{
        const weight = RANKING_SOURCES[i].weight;
        TEAMS[team].fornecedoras.forEach(f=>{
          const hit = Object.keys(counts).find(k=>k.includes(f) || f.includes(k));
          if(hit) scores[f] += counts[hit]*weight;
        });
      });
      teamScores[team] = TEAMS[team].fornecedoras
        .map(f=>({nome:f, score:scores[f]}))
        .sort((a,b)=>a.score-b.score);
    }

    el.innerHTML = Object.keys(TEAMS).map(team=>`
      <div>
        <div class="rank-col-title">${TEAMS[team].label}</div>
        ${teamScores[team].map((r,i)=>`<div class="rank-row"><div class="rank-pos">${i+1}º</div><div class="rank-name">${r.nome}</div><div class="rank-score">${r.score}</div></div>`).join('')}
      </div>`).join('');
  }catch(err){
    console.error('Erro no ranking:', err);
    el.innerHTML = `<div class="placeholder">Não foi possível carregar o ranking agora (${err.message}). Toque em "Atualizar ranking" para tentar de novo.</div>`;
  }finally{
    RANKING_LOADING = false;
  }
}
</script>
