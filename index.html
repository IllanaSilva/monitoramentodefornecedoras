body,body *{transition:background-color var(--tr),border-color var(--tr),color var(--tr)}

::-webkit-scrollbar-track{background:var(--bg2)}

.f-btn{width:100%;margin-top:18px;padding:10px;background:var(--green);border:none;border-radius:var(--rsm);color:var(--bg);font-weight:600;cursor:pointer;font-size:13px}
.f-btn:hover{background:var(--green2)}

.sidebar{width:230px;height:100vh;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow:hidden}
.main{margin-left:230px;flex:1;min-height:100vh}

.nav-btn:hover{background:var(--bg4);color:var(--text2)}
.nav-btn.active{background:var(--green3);color:var(--green);border:1px solid var(--bdr2)}

.logout-btn{margin-top:8px;width:100%;padding:7px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--rsm);color:var(--text2);cursor:pointer;font-size:11px}

.content{padding:28px 32px;max-width:1240px}

.tbl-wrap{overflow-x:auto;border:1px solid var(--bdr);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;white-space:nowrap}
td{padding:9px 12px;border-top:1px solid var(--bdr);color:var(--text)}
tr:hover td{background:var(--bg4)}

/* ===== VISÃO COMBINADA + SPLIT POR EQUIPE ===== */

<body>
<button id="theme-toggle" onclick="toggleTheme()" title="Alternar modo claro/escuro">🌙</button>

<!-- ===================== LOGIN (senha única) ===================== -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="ic">iG</div>
      <div>
        <div class="login-title">Monitoramento de Fornecedoras</div>
        <div class="login-sub">// iGREEN ENERGY</div>
      </div>
    </div>
    <div class="f-label">Senha de acesso</div>
    <input class="f-input" type="password" id="gate-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doGateLogin()">

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="app">
    <div class="sidebar">
      <div class="logo">
        <div class="logo-row">
          <div class="logo-icon">iG</div>

        </div>

<script>
/* ============================================================
   0. TEMA CLARO / ESCURO
   ============================================================ */
function applyTheme(mode){
  document.body.classList.toggle('theme-light', mode === 'light');
  document.getElementById('theme-toggle').textContent = mode === 'light' ? '☀️' : '🌙';
}
function toggleTheme(){
  const current = localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('igreen_theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark');

/* ============================================================
   1. CONFIGURAÇÃO DO FIREBASE
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCRsllTYwx6m4eu0ZLTU54pWWFdbuoTK8k",
  authDomain: "monitoramento-de-fornecedoras.firebaseapp.com",
  projectId: "monitoramento-de-fornecedoras",
  storageBucket: "monitoramento-de-fornecedoras.firebasestorage.app",
  messagingSenderId: "467362278382",
  appId: "1:467362278382:web:3b75414ed0d127e410fcff"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================================================
   2. ESTRUTURA ORGANIZACIONAL
   ============================================================ */
const SUPERADMINS = [
  "guilherme.valentim@igreenenergy.com.br",
  "raul.santana@igreenenergy.com.br",
  "pedro.octavio@igreenenergy.com.br",

const TEAMS = {
  paulo: {
    label: 'Equipe Paulo',
    lead: 'paulo.alcantara@igreenenergy.com.br',
    fornecedoras: ['COTESA','SUNCLICK','COMERC','THOPEN','FARO','ATUA','VANTAGE','BOM FUTURO','GENIAL','IGREEN','MONCARLO','ULTRA'],
    setores: {
      boletos_api: {people:['Pedro Paulo Rodrigues','Lavínia Veloso'], emails:['pedropaulo.rodrigues@igreenenergy.com.br','lavinia.veloso@igreenenergy.com.br']},
      bases: {people:['Samuel Claudino','Illana Silva'], emails:['samuel.claudino@igreenenergy.com.br','illana.silva@igreenenergy.com.br']},
      finalizados: {people:['Samuel Claudino'], emails:['samuel.claudino@igreenenergy.com.br']},
      devolutivas: {people:['Nathalie Kristine','Gabriela Souza'], emails:['nathalie.rezende@igreenenergy.com.br','gabriela.souza@igreenenergy.com.br']},
      atraso_injecao: {people:['Tiago Reis'], emails:['tiago.reis@igreenenergy.com.br']},
      faturamento: {people:['Não definido'], emails:[]}
    }
  },
  andressa: {
    label: 'Equipe Andressa',
    lead: 'andressa.borba@igreenenergy.com.br',
    fornecedoras: ['FIT','SOLATIO','GEDISA','SUNNE','GV','EDP','MATRIX','BC','ORIGO','RESERVA'],
    setores: {
      boletos_api: {people:['Stella Resende','Ghabriel Costa'], emails:['stella.resende@igreenenergy.com.br','ghabriel.costa@igreenenergy.com.br']},
      bases: {people:['Maria Eduarda Nóbrega','Matheus Teodoro'], emails:['mariaeduarda.nobrega@igreenenergy.com.br','matheus.teodoro@igreenenergy.com.br']},
      api_leads: {people:['Ana Laura Lima'], emails:['analaura.lima@igreenenergy.com.br']},
      devolutivas: {people:['Ana Luiza Martins','Ana Clara Barros'], emails:['analuiza.martins@igreenenergy.com.br','annaclara.barros@igreenenergy.com.br']},
      atraso_injecao: {people:['Roberto Marques'], emails:['roberto.marques@igreenenergy.com.br']},
      faturamento: {people:['Ícaro Silva','Ghabriel Costa'], emails:['icaro.silva@igreenenergy.com.br','ghabriel.costa@igreenenergy.com.br']}
    }
  }
};

// Definição única das abas por setor — vale para as duas equipes (a menos que "onlyTeam" limite a uma só)
const SETOR_DEFS = {
  boletos_api: {label:'Boletos / API', tabs:[
    {key:'erros', label:'Erros de API', sub:'erros_api'},
    {key:'boletos', label:'Boletos Faltantes', sub:'boletos_faltantes'},
    {key:'clickups', label:'ClickUps Abertos', sub:'clickups_abertos'},
    {key:'analise', label:'Análise Boletos', sub:'analise_boletos', kind:'analise'}
  ]},
  bases: {label:'Bases', tabs:[
    {key:'conciliadas', label:'Bases Conciliadas', sub:'conciliadas', kind:'conciliadas'},
    {key:'cancelados', label:'Clientes Cancelados', sub:'cancelados'},
    {key:'clickups', label:'ClickUps Abertos', sub:'clickups_abertos'}
  ]},
  finalizados: {label:'Finalizados', onlyTeam:'paulo', tabs:[
    {key:'finalizados', label:'Clientes Finalizados', sub:'finalizados'},
    {key:'migrados', label:'Clientes Migrados', sub:'migrados'}
  ]},
  api_leads: {label:'API Leads', onlyTeam:'andressa', tabs:[
    {key:'leads', label:'API Leads', sub:'leads', kind:'leads'}
  ]},
  devolutivas: {label:'Devolutivas', tabs:[
    {key:'devolutivas', label:'Devolutivas', sub:'devolutivas'},
    {key:'clickup', label:'ClickUp Devolutivas', sub:'clickup'},
    {key:'demandas', label:'Demandas Extras', sub:'demandas_extras'}
  ]},
  atraso_injecao: {label:'Atraso de Injeção', tabs:[
    {key:'atual', label:'Clientes em Atraso', sub:'clientes_atraso'},
    {key:'entrando', label:'Entrando em Atraso', sub:'entrando_atraso'},
    {key:'qualidade', label:'Qualidade de Injeção', sub:'qualidade'},
    {key:'represados', label:'Clientes Represados', sub:'represados'}
  ]},
  faturamento: {label:'Faturamento', tabs:[
    {key:'geral', label:'Faturamento', sub:'geral'}
  ]}
};

function teamsForSetor(setorKey){
  const def = SETOR_DEFS[setorKey];
  return def.onlyTeam ? [def.onlyTeam] : Object.keys(TEAMS);
}
function pathFor(team, setorKey, sub){ return `equipes/${team}/${setorKey}/${sub}/registros`; }

/* ============================================================
   3. RESOLUÇÃO DE ACESSO
   ============================================================ */
const ACCESS_PASSWORD = "iGreen2026"; // senha única de visualização — troque aqui quando quiser
let ELEVATED = null; // preenchido quando alguém faz login como responsável de área (só pra liberar upload)

function resolveAccess(email){
  email = (email||'').toLowerCase().trim();
  const isSuper = SUPERADMINS.includes(email);
  const access = {email, isSuper, teams:{}};
  Object.keys(TEAMS).forEach(teamKey=>{
    const team = TEAMS[teamKey];
    const isLead = team.lead === email;
    let setores = [];
    if(isSuper || isLead){
      setores = Object.keys(team.setores);
    } else {
      setores = Object.keys(team.setores).filter(sk => team.setores[sk].emails.includes(email));
    }
    if(isSuper || isLead || setores.length){
      access.teams[teamKey] = {lead:isLead, setores};
    }
  });
  return access;
}
function findDisplayName(email){
  email=(email||'').toLowerCase();
  for(const tk in TEAMS){
    for(const sk in TEAMS[tk].setores){
      const s = TEAMS[tk].setores[sk];
      const idx = s.emails.indexOf(email);
      if(idx>-1) return s.people[idx];
    }
  }
  return email;
}
function canUpload(teamKey, setorKey){
  if(!ELEVATED) return false;
  if(ELEVATED.isSuper) return true;
  const teamAccess = ELEVATED.teams[teamKey];
  if(!teamAccess) return false;
  return teamAccess.lead || teamAccess.setores.includes(setorKey);
}

/* ============================================================
   4. GATE DE SENHA (visualização) + LOGIN DE RESPONSÁVEL (inline no upload)
   ============================================================ */
function doGateLogin(){
  const pass = document.getElementById('gate-pass').value;
  const err = document.getElementById('gate-err');
  if(pass !== ACCESS_PASSWORD){
    err.textContent = 'Senha incorreta.';
    err.style.display='block';
    return;
  }
  sessionStorage.setItem('igreen_gate','ok');
  enterApp();
}
function doGateLogout(){
  sessionStorage.removeItem('igreen_gate');
  auth.signOut();
  ELEVATED = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  buildNav();
  goPage('inicio');
}
function doInlineRespLogin(inputId){
  const email = document.getElementById(inputId+'-email').value.trim();
  const pass = document.getElementById(inputId+'-pass').value;
  const err = document.getElementById(inputId+'-err');
  err.style.display='none';
  auth.signInWithEmailAndPassword(email, pass).catch(e=>{
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display='block';
  });
}
function doRespLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user && user.email){
    ELEVATED = resolveAccess(user.email);
    ELEVATED.displayName = findDisplayName(user.email);
  } else {
    ELEVATED = null;
  }
  if(sessionStorage.getItem('igreen_gate')==='ok'){
    goPage(CURRENT_PAGE || 'inicio'); // re-renderiza pra mostrar/ocultar upload conforme login
  }
});
if(sessionStorage.getItem('igreen_gate')==='ok'){ enterApp(); }

/* ============================================================
   5. NAVEGAÇÃO — unificada, sem divisão por equipe (exceto início)
   ============================================================ */
let CURRENT_PAGE = null;

function buildNav(){
  const nav = document.getElementById('nav');
  let html = `<button class="nav-btn" onclick="goPage('inicio')" id="nb-inicio">🏠 Início</button>`;
  Object.keys(SETOR_DEFS).forEach(sk=>{
    const setor = SETOR_DEFS[sk];
    html += `<div class="nav-sec">${setor.label}</div>`;
    setor.tabs.forEach(tab=>{
      const pageId = sk+'__'+tab.key;
      html += `<button class="nav-btn" onclick="goPage('${pageId}')" id="nb-${pageId}">${tab.label}</button>`;
    });
  });
  nav.innerHTML = html;
}
function markActive(pageId){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nb-'+pageId);
  if(btn) btn.classList.add('active');
}
function findTabDef(pageId){
  const [setorKey, tabKey] = pageId.split('__');
  const setor = SETOR_DEFS[setorKey];
  if(!setor) return null;
  const tab = setor.tabs.find(t=>t.key===tabKey);
  if(!tab) return null;
  return {setorKey, tab, setorLabel:setor.label};
}

/* ============================================================
   6. ROUTER
   ============================================================ */
let ACTIVE_LISTENERS = [];
function clearListeners(){ ACTIVE_LISTENERS.forEach(u=>u()); ACTIVE_LISTENERS=[]; }

function goPage(pageId){
  clearListeners();
  CURRENT_PAGE = pageId;
  markActive(pageId);
  if(pageId === 'inicio'){ renderHome(); return; }
  const found = findTabDef(pageId);
  const c = document.getElementById('page-container');
  if(!found){ c.innerHTML = '<div class="placeholder">Página não encontrada.</div>'; return; }
  const {setorKey, tab, setorLabel} = found;
  const teams = teamsForSetor(setorKey);
  if(tab.kind === 'conciliadas'){
    renderConciliadasPage(setorKey, tab, setorLabel, teams);
  } else {
    renderTabPage(setorKey, tab, setorLabel, teams);
  }
}

/* ============================================================
   7. UPLOAD (upload em si OU login inline de responsável)
   ============================================================ */
function uploadBoxHTML(teamKey, setorKey, path, inputId){
  if(canUpload(teamKey, setorKey)){
    return `<div class="upload-box">
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Enviar planilha (.xlsx / .csv) — logado como ${ELEVATED.displayName}</div>
        <input type="file" id="${inputId}" accept=".xlsx,.xls,.csv">
      </div>
      <button class="btn btn-primary" onclick="handleUpload('${inputId}','${path}')">Enviar para o painel</button>
      <span class="tag" id="${inputId}-status"></span>
      <button class="btn" style="margin-left:auto;font-size:10px" onclick="doRespLogout()">sair do modo responsável</button>
    </div>`;
  }
  return `<div class="upload-box">
    <div style="flex:1;min-width:240px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">É responsável por essa área? Entre para poder enviar planilhas aqui.</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <input class="f-input" style="width:210px" type="email" id="${inputId}-email" placeholder="seu.email@igreenenergy.com.br">
        <input class="f-input" style="width:130px" type="password" id="${inputId}-pass" placeholder="senha">
        <button class="btn btn-primary" onclick="doInlineRespLogin('${inputId}')">Entrar</button>
      </div>
      <div class="resp-err" id="${inputId}-err"></div>
    </div>
  </div>`;
}

function handleUpload(inputId, path){
  const input = document.getElementById(inputId);
  const status = document.getElementById(inputId+'-status');
  if(!input.files.length){ status.textContent='Escolha um arquivo primeiro.'; return; }
  status.textContent = 'Lendo arquivo...';
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ status.textContent='Planilha vazia.'; return; }
      status.textContent = `Enviando ${rows.length} linhas...`;
      const col = db.collection(path);
      const old = await col.get();
      let batch = db.batch(); let opCount = 0;
      for(const d of old.docs){ batch.delete(d.ref); opCount++; if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; } }
      if(opCount>0){ await batch.commit(); batch=db.batch(); opCount=0; }
      for(const row of rows){
        batch.set(col.doc(), {...row, _uploadedAt: firebase.firestore.FieldValue.serverTimestamp(), _uploadedBy: ELEVATED ? ELEVATED.email : 'desconhecido'});
        opCount++;
        if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; }
      }
      if(opCount>0) await batch.commit();
      status.textContent = `${rows.length} linhas enviadas com sucesso.`;
    }catch(err){
      console.error(err);
      status.textContent = 'Erro ao enviar: '+err.message;
    }
  };
  reader.readAsArrayBuffer(input.files[0]);
}

/* ============================================================
   8. HELPERS GENÉRICOS
   ============================================================ */
function detectField(row, candidates){
  const keys = Object.keys(row);
  for(const cand of candidates){
    const hit = keys.find(k=>k.toLowerCase().includes(cand));
    if(hit) return hit;
  }
  return null;
}
function barsHTML(counts){
  const keys = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const max = Math.max(...Object.values(counts), 1);
  return keys.map(k=>{
    const pct = Math.round((counts[k]/max)*100);
    return `<div class="bar-row"><div class="lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${counts[k]}</div></div>`;
  }).join('');
}
function tableHTML(rows, wrapId){
  if(!rows.length) return `<div class="placeholder">Nenhum dado ainda. Envie a planilha acima para começar.</div>`;
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_')).slice(0,10);
  let html = '<table><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  rows.slice(0,300).forEach(r=>{
    html += '<tr>'+cols.map(c=>`<td>${r[c]!==undefined?r[c]:''}</td>`).join('')+'</tr>';
  });
  html += '</tbody></table>';
  return html;
}

/* ============================================================
   9. MOTOR DE NAVEGAÇÃO EM CAMADAS — visão geral → equipe → fornecedora
   Usado por TODAS as abas (genéricas e Bases Conciliadas)
   ============================================================ */
let PAGE = null; // {setorKey, tab, setorLabel, teams, rowsByTeam, view, team, fornecedora}

function statusBreakdown(rows){
  if(!rows.length) return null;
  const field = detectField(rows[0], ['status','situa','resultado','classificac','pendenc']);
  if(!field) return null;
  const counts = {};
  rows.forEach(r=>{
    const v = (r[field]||'—').toString().trim() || '—';
    counts[v] = (counts[v]||0)+1;
  });
  return {field, counts};
}
function recorrenteBreakdown(rows){
  if(!rows.length) return null;
  const field = detectField(rows[0], ['motivo','tipo','descric','devolutiva','categoria']);
  if(!field) return null;
  const counts = {};
  rows.forEach(r=>{
    const v = (r[field]||'—').toString().trim() || '—';
    counts[v] = (counts[v]||0)+1;
  });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const obj = {}; top.forEach(([k,v])=>obj[k]=v);
  return {field, counts:obj};
}
function fornecedoraBreakdown(rows){
  if(!rows.length) return null;
  const field = detectField(rows[0], ['fornecedor','supplier']);
  const counts = {};
  rows.forEach(r=>{
    const f = field ? (r[field]||'—').toString() : '—';
    counts[f] = (counts[f]||0)+1;
  });
  return {field, counts};
}
function kpiCardsForKind(kind, rows){
  if(!rows.length) return `<div class="kpi"><div class="v">0</div><div class="l">registros</div></div>`;
  if(kind === 'analise'){
    const sb = statusBreakdown(rows);
    let movidos=0, ok=0;
    if(sb) Object.entries(sb.counts).forEach(([k,v])=>{
      const kl = k.toLowerCase();
      if(kl.includes('mov')) movidos+=v;
      else if(kl.includes('ok')||kl.includes('correto')) ok+=v;
    });
    return `<div class="kpi"><div class="v">${rows.length.toLocaleString('pt-BR')}</div><div class="l">boletos analisados</div></div>
      <div class="kpi"><div class="v">${sb?movidos.toLocaleString('pt-BR'):'—'}</div><div class="l">boletos movidos</div></div>
      <div class="kpi"><div class="v">${sb?ok.toLocaleString('pt-BR'):'—'}</div><div class="l">boletos ok</div></div>`;
  }
  if(kind === 'leads'){
    const sb = statusBreakdown(rows);
    let corrigidos=0, validados=0;
    if(sb) Object.entries(sb.counts).forEach(([k,v])=>{
      const kl = k.toLowerCase();
      if(kl.includes('corrig')) corrigidos+=v;
      if(kl.includes('valid')) validados+=v;
    });
    return `<div class="kpi"><div class="v">${rows.length.toLocaleString('pt-BR')}</div><div class="l">leads recebidos</div></div>
      <div class="kpi"><div class="v">${sb?corrigidos.toLocaleString('pt-BR'):'—'}</div><div class="l">leads corrigidos</div></div>
      <div class="kpi"><div class="v">${sb?validados.toLocaleString('pt-BR'):'—'}</div><div class="l">leads validados</div></div>`;
  }
  if(kind === 'conciliadas'){
    const divField = detectField(rows[0], ['diverg']);
    let diverg = 0;
    if(divField) rows.forEach(r=>{
      const v = String(r[divField]||'').toLowerCase();
      if(v && v!=='ok' && v!=='0' && v!=='false' && v!=='não' && v!=='nao') diverg++;
    });
    return `<div class="kpi"><div class="v">${rows.length.toLocaleString('pt-BR')}</div><div class="l">clientes conciliados</div></div>
      <div class="kpi"><div class="v" style="color:${diverg?'var(--red)':'var(--green)'}">${divField?diverg.toLocaleString('pt-BR'):'—'}</div><div class="l">divergências</div></div>`;
  }
  // genérico — total + até 3 status mais comuns
  const sb = statusBreakdown(rows);
  let html = `<div class="kpi"><div class="v">${rows.length.toLocaleString('pt-BR')}</div><div class="l">clientes</div></div>`;
  if(sb){
    Object.entries(sb.counts).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([k,v])=>{
      html += `<div class="kpi"><div class="v">${v.toLocaleString('pt-BR')}</div><div class="l">${k}</div></div>`;
    });
  }
  return html;
}

function renderTabPage(setorKey, tab, setorLabel, teams){
  PAGE = {setorKey, tab, setorLabel, teams, rowsByTeam:{}, view: teams.length===1?'team':'overview', team: teams.length===1?teams[0]:null, fornecedora:null};
  teams.forEach(team=>{
    const path = pathFor(team, setorKey, tab.sub);
    const unsub = db.collection(path).limit(5000).onSnapshot(snap=>{
      PAGE.rowsByTeam[team] = snap.docs.map(d=>d.data());
      drawPage();
    }, err=>{
      const c = document.getElementById('page-container');
      if(c) c.innerHTML = '<div class="placeholder">Erro ao carregar: '+err.message+'</div>';
    });
    ACTIVE_LISTENERS.push(unsub);
  });
  drawPage(); // já desenha a estrutura com "carregando..." antes do primeiro snapshot
}
// Bases Conciliadas usa exatamente o mesmo motor
function renderConciliadasPage(setorKey, tab, setorLabel, teams){ renderTabPage(setorKey, tab, setorLabel, teams); }

function drawPage(){
  if(!PAGE) return;
  const c = document.getElementById('page-container');
  const {setorKey, tab, setorLabel, teams, rowsByTeam, view, team, fornecedora} = PAGE;

  if(view === 'fornecedora'){
    drawFornecedoraView(c);
    return;
  }
  if(view === 'team'){
    drawTeamView(c);
    return;
  }
  drawOverviewView(c);
}

function drawOverviewView(c){
  const {tab, setorLabel, teams, rowsByTeam} = PAGE;
  const combined = teams.reduce((acc,t)=>acc.concat(rowsByTeam[t]||[]), []);
  const fb = fornecedoraBreakdown(combined);
  c.innerHTML = `
    <div class="pg-title">${tab.label}</div>
    <div class="pg-sub">// ${setorLabel} · visão geral combinada — Equipe Paulo + Equipe Andressa</div>
    <div class="kpi-row">${kpiCardsForKind(tab.kind, combined)}</div>
    ${fb && Object.keys(fb.counts).length ? `<div class="section-hd">Distribuição por fornecedora<span class="line"></span></div><div style="margin-bottom:22px">${barsHTML(fb.counts)}</div>` : ''}
    <div class="section-hd">Selecione uma equipe para ver o detalhamento<span class="line"></span></div>
    <div class="card-grid">
      ${teams.map(t=>{
        const n = (rowsByTeam[t]||[]).length;
        return `<div class="f-card" onclick="openTeamView('${t}')">
          <div class="name">${TEAMS[t].label}</div>
          <div class="n">${n}</div>
          <div class="l">registros</div>
        </div>`;
      }).join('')}
    </div>`;
}

function openTeamView(team){
  PAGE.view = 'team';
  PAGE.team = team;
  drawPage();
}

function drawTeamView(c){
  const {setorKey, tab, teams, rowsByTeam, team} = PAGE;
  const rows = rowsByTeam[team] || [];
  const rec = recorrenteBreakdown(rows);
  const fb = fornecedoraBreakdown(rows);
  const inputId = 'up-'+setorKey+'-'+tab.key+'-'+team;
  const path = pathFor(team, setorKey, tab.sub);
  const showBack = teams.length > 1;

  c.innerHTML = `
    ${showBack ? `<button class="back-btn" onclick="backToOverview()">← Voltar para visão geral</button>` : ''}
    <div class="pg-title">${tab.label} — ${TEAMS[team].label}</div>
    <div class="pg-sub">// visão geral dessa equipe</div>
    <div class="kpi-row">${kpiCardsForKind(tab.kind, rows)}</div>
    ${rec && Object.keys(rec.counts).length ? `<div class="section-hd">Mais recorrentes (${rec.field})<span class="line"></span></div><div style="margin-bottom:22px">${barsHTML(rec.counts)}</div>` : ''}
    ${uploadBoxHTML(team, setorKey, path, inputId)}
    <div class="section-hd">Por fornecedora<span class="line"></span></div>
    <div class="card-grid">
      ${fb && Object.keys(fb.counts).length ? Object.keys(fb.counts).sort((a,b)=>fb.counts[b]-fb.counts[a]).map(f=>`
        <div class="f-card" onclick="openFornecedoraView('${encodeURIComponent(f)}')">
          <div class="name">${f}</div>
          <div class="n">${fb.counts[f]}</div>
          <div class="l">clientes</div>
        </div>`).join('') : '<div class="placeholder">Nenhum dado ainda. Envie a planilha acima para começar.</div>'}
    </div>`;
}

function backToOverview(){
  PAGE.view = 'overview';
  PAGE.team = null;
  drawPage();
}

function openFornecedoraView(fornecedoraEnc){
  PAGE.view = 'fornecedora';
  PAGE.fornecedora = decodeURIComponent(fornecedoraEnc);
  drawPage();
}

function drawFornecedoraView(c){
  const {tab, rowsByTeam, team, fornecedora} = PAGE;
  const rows = rowsByTeam[team] || [];
  const fb = fornecedoraBreakdown(rows);
  const filtered = fb && fb.field ? rows.filter(r=>String(r[fb.field]||'—')===fornecedora) : rows;
  const sb = statusBreakdown(filtered);

  c.innerHTML = `
    <button class="back-btn" onclick="backToTeam()">← Voltar para ${TEAMS[team].label}</button>
    <div class="pg-title">${fornecedora}</div>
    <div class="pg-sub">// ${tab.label} — ${TEAMS[team].label}</div>
    <div class="kpi-row">
      <div class="kpi"><div class="v">${filtered.length.toLocaleString('pt-BR')}</div><div class="l">clientes</div></div>
    </div>
    ${sb && Object.keys(sb.counts).length ? `<div class="section-hd">O que foi feito<span class="line"></span></div><div style="margin-bottom:20px">${barsHTML(sb.counts)}</div>` : ''}
    <div class="tbl-wrap">${tableHTML(filtered)}</div>`;
}

function backToTeam(){
  PAGE.view = 'team';
  PAGE.fornecedora = null;
  drawPage();
}

/* ============================================================
   11. INÍCIO — banner, acesso rápido e ranking por equipe
   ============================================================ */
const RANKING_SOURCES = [
  {setorKey:'atraso_injecao', sub:'clientes_atraso', weight:1},
  {setorKey:'atraso_injecao', sub:'entrando_atraso', weight:2},
  {setorKey:'atraso_injecao', sub:'represados', weight:4},
  {setorKey:'bases', sub:'cancelados', weight:3},
  {setorKey:'boletos_api', sub:'erros_api', weight:3}
];

function renderHome(){
  const c = document.getElementById('page-container');
  let quickHtml = '';
  Object.keys(SETOR_DEFS).forEach(sk=>{
    const setor = SETOR_DEFS[sk];
    setor.tabs.forEach(tab=>{
      quickHtml += `<button class="quick-btn" onclick="goPage('${sk}__${tab.key}')">
        <div class="lbl">${tab.label}</div><div class="setor">${setor.label}</div>
      </button>`;
    });
  });

  c.innerHTML = `
    <div class="home-banner">
      <div>
        <div class="t">🌿 Monitoramento de Fornecedoras</div>
        <div class="s">Visão executiva · dados em tempo real via Firestore</div>
      </div>
      <button class="btn btn-primary" onclick="loadRanking()">↻ Atualizar ranking</button>
    </div>
    <div class="section-hd">Acesso rápido<span class="line"></span></div>
    <div class="quick-grid">${quickHtml}</div>
    <div class="section-hd">🏆 Ranking de fornecedoras — por equipe<span class="line"></span></div>
    <div class="tag" style="display:block;margin-bottom:14px">Menor pontuação = melhor desempenho · some divergências, atrasos e cancelamentos</div>
    <div class="rank-cols" id="rank-cols"><div class="placeholder">Carregando ranking...</div></div>`;
  loadRanking();
}

async function fetchCountsByFornecedora(team, setorKey, sub){
  const path = pathFor(team, setorKey, sub);
  try{
    const snap = await db.collection(path).limit(5000).get();
    const rows = snap.docs.map(d=>d.data());
    if(!rows.length) return {};
    const fField = detectField(rows[0], ['fornecedor','supplier']);
    const counts = {};
    rows.forEach(r=>{
      const f = fField ? (r[fField]||'').toString().toUpperCase() : '';
      if(f) counts[f] = (counts[f]||0)+1;
    });
    return counts;
  }catch(e){ return {}; }
}

async function loadRanking(){
  const el = document.getElementById('rank-cols');
  if(!el) return;
  el.innerHTML = '<div class="placeholder">Carregando ranking...</div>';

  const teamScores = {};
  for(const team of Object.keys(TEAMS)){
    const scores = {};
    TEAMS[team].fornecedoras.forEach(f=>scores[f]=0);
    for(const src of RANKING_SOURCES){
      const counts = await fetchCountsByFornecedora(team, src.setorKey, src.sub);
      TEAMS[team].fornecedoras.forEach(f=>{
        const hit = Object.keys(counts).find(k=>k.includes(f) || f.includes(k));
        if(hit) scores[f] += counts[hit]*src.weight;
      });
    }
    teamScores[team] = TEAMS[team].fornecedoras
      .map(f=>({nome:f, score:scores[f]}))
      .sort((a,b)=>a.score-b.score);
  }

  el.innerHTML = Object.keys(TEAMS).map(team=>`
    <div>
      <div class="rank-col-title">${TEAMS[team].label}</div>
      ${teamScores[team].map((r,i)=>`<div class="rank-row"><div class="rank-pos">${i+1}º</div><div class="rank-name">${r.nome}</div><div class="rank-score">${r.score}</div></div>`).join('')}
    </div>`).join('');
}
