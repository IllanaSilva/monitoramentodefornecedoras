<style>
:root{

/* ============================================================
   0. TEMA CLARO / ESCURO
   ============================================================ */
function applyTheme(mode){
  document.body.classList.toggle('theme-light', mode === 'light');
  document.getElementById('theme-toggle').textContent = mode === 'light' ? '☀️' : '🌙';
}
function toggleTheme(){
  const current = localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('igreen_theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark');

/* ============================================================

   ============================================================ */

/* ============================================================
   3. RESOLUÇÃO DE ACESSO
   ============================================================ */
const ACCESS_PASSWORD = "iGreen2026"; // senha única de visualização — troque aqui quando quiser

let ELEVATED = null; // preenchido quando alguém faz login como responsável de área

function resolveAccess(email){
  email = (email||'').toLowerCase().trim();
  const isSuper = SUPERADMINS.includes(email);
  const access = {email, isSuper, teams:{}};
  Object.keys(TEAMS).forEach(teamKey=>{
    const team = TEAMS[teamKey];
    const isLead = team.lead === email;
    let setores = [];
    if(isSuper || isLead){
      setores = Object.keys(team.setores); // acesso total dentro da equipe
    } else {
      setores = Object.keys(team.setores).filter(sk => team.setores[sk].emails.includes(email));
    }
    if(isSuper || isLead || setores.length){
      access.teams[teamKey] = {lead:isLead, setores};
    }
  });
  return access;
}

function findDisplayName(email){
  email=(email||'').toLowerCase();
  for(const tk in TEAMS){
    for(const sk in TEAMS[tk].setores){
      const s = TEAMS[tk].setores[sk];
      const idx = s.emails.indexOf(email);
      if(idx>-1) return s.people[idx];
    }
  }
  return email;
}

/* ============================================================
   4. GATE DE SENHA (visualização geral) + LOGIN DE RESPONSÁVEL
   ============================================================ */
function doGateLogin(){
  const pass = document.getElementById('gate-pass').value;
  const err = document.getElementById('gate-err');
  if(pass !== ACCESS_PASSWORD){
    err.textContent = 'Senha incorreta.';
    err.style.display='block';
    return;
  }
  sessionStorage.setItem('igreen_gate','ok');
  enterApp();
}
function doGateLogout(){
  sessionStorage.removeItem('igreen_gate');
  auth.signOut();
  ELEVATED = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  ACTIVE_TEAM = Object.keys(TEAMS)[0];
  buildTeamSwitch();
  buildNav();
  buildRespBox();
  goPage('inicio');
}

// login pessoal do responsável pela área — só libera upload, não afeta a visualização
function doRespLogin(){
  const email = document.getElementById('resp-email').value.trim();
  const pass = document.getElementById('resp-pass').value;
  const err = document.getElementById('resp-err');
  err.style.display='none';
  auth.signInWithEmailAndPassword(email, pass).catch(e=>{
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display='block';
  });
}
function doRespLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user && user.email){
    ELEVATED = resolveAccess(user.email);
    ELEVATED.displayName = findDisplayName(user.email);
  } else {
    ELEVATED = null;
  }
  if(sessionStorage.getItem('igreen_gate')==='ok'){
    buildRespBox();
    goPage(CURRENT_PAGE || 'inicio'); // re-renderiza para mostrar/ocultar upload
  }
});

function buildRespBox(){
  const el = document.getElementById('resp-box');
  if(ELEVATED){
    el.innerHTML = `<div class="resp-title">Responsável logado</div>
      <div class="resp-active"><b>${ELEVATED.displayName}</b>pode subir arquivos na área dele(a)</div>
      <button class="logout-btn" onclick="doRespLogout()">Sair do modo responsável</button>`;
  } else {
    el.innerHTML = `<div class="resp-title">Sou responsável por uma área</div>
      <input class="f-input" type="email" id="resp-email" placeholder="seu.email@igreenenergy.com.br">
      <input class="f-input" type="password" id="resp-pass" placeholder="senha">
      <button class="f-btn" onclick="doRespLogin()">Entrar como responsável</button>
      <div class="resp-err" id="resp-err"></div>`;
  }
}

// se a senha geral já foi validada nesta aba, entra direto (sem precisar digitar de novo)
if(sessionStorage.getItem('igreen_gate')==='ok'){ enterApp(); }

/* ============================================================
   5. NAVEGAÇÃO — visível para qualquer pessoa que passou o gate
   ============================================================ */
let ACTIVE_TEAM = null;
let CURRENT_PAGE = null;

function buildTeamSwitch(){
  const el = document.getElementById('team-switch');
  const teamKeys = Object.keys(TEAMS);
  el.innerHTML = teamKeys.map(tk=>
    `<button class="${tk===ACTIVE_TEAM?'active':''}" onclick="switchTeam('${tk}')">${TEAMS[tk].label}</button>`
  ).join('');
}
function switchTeam(tk){ ACTIVE_TEAM = tk; buildTeamSwitch(); buildNav(); goPage('inicio'); }

function buildNav(){
  const nav = document.getElementById('nav');
  const team = TEAMS[ACTIVE_TEAM];
  let html = `<button class="nav-btn" onclick="goPage('inicio')" id="nb-inicio">🏠 Início</button>`;
  Object.keys(team.setores).forEach(sk=>{
    const setor = team.setores[sk];
    html += `<div class="nav-sec">${setor.label}</div>`;
    setor.tabs.forEach(tab=>{
      html += `<button class="nav-btn" onclick="goPage('${tab.id}')" id="nb-${tab.id}">${tab.label}</button>`;
    });
  });
  nav.innerHTML = html;
}

function markActive(pageId){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nb-'+pageId);
  if(btn) btn.classList.add('active');
}

function findTab(tabId){
  const team = TEAMS[ACTIVE_TEAM];
  for(const sk in team.setores){
    const tab = team.setores[sk].tabs.find(t=>t.id===tabId);
    if(tab) return {tab, setorKey:sk, setor:team.setores[sk]};
  }
  return null;
}

// upload só libera se a pessoa "responsável" logada tiver essa equipe+setor (ou for líder/super-admin)
function canUpload(teamKey, setorKey){
  if(!ELEVATED) return false;
  if(ELEVATED.isSuper) return true;
  const teamAccess = ELEVATED.teams[teamKey];
  if(!teamAccess) return false;
  return teamAccess.lead || teamAccess.setores.includes(setorKey);
}

/* ============================================================
   6. ROUTER
   ============================================================ */
let ACTIVE_LISTENERS = [];
function clearListeners(){ ACTIVE_LISTENERS.forEach(u=>u()); ACTIVE_LISTENERS=[]; }

function goPage(pageId){
  clearListeners();
  CURRENT_PAGE = pageId;
  markActive(pageId);
  const c = document.getElementById('page-container');

  if(pageId === 'inicio'){
    const team = TEAMS[ACTIVE_TEAM];
    c.innerHTML = `
      <div class="pg-title">🗺️ ${team.label}</div>
      <div class="pg-sub">// fornecedoras: ${team.fornecedoras.join(', ')}</div>
      <div class="placeholder">Selecione uma aba no menu à esquerda. Os dados aparecem aqui em tempo real assim que forem enviados ao Firestore.</div>`;
    return;
  }

  const found = findTab(pageId);
  if(!found) { c.innerHTML = '<div class="placeholder">Página não encontrada.</div>'; return; }
  const {tab, setorKey} = found;

  if(tab.kind === 'conciliadas'){
    renderConciliadas(tab, setorKey, ACTIVE_TEAM);
  } else {
    renderGenericTab(tab, setorKey, ACTIVE_TEAM);
  }
}

/* ============================================================
   7. UPLOAD (Excel/CSV -> Firestore)
   ============================================================ */
function uploadBoxHTML(teamKey, setorKey, path, inputId){
  if(!canUpload(teamKey, setorKey)) return '';
  return `<div class="upload-box">
    <div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Enviar planilha (.xlsx / .csv)</div>
      <input type="file" id="${inputId}" accept=".xlsx,.xls,.csv">
    </div>
    <button class="btn btn-primary" onclick="handleUpload('${inputId}','${path}')">Enviar para o painel</button>
    <span class="tag" id="${inputId}-status"></span>
  </div>`;
}

function handleUpload(inputId, path){
  const input = document.getElementById(inputId);
  const status = document.getElementById(inputId+'-status');
  if(!input.files.length){ status.textContent='Escolha um arquivo primeiro.'; return; }
  status.textContent = 'Lendo arquivo...';
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ status.textContent='Planilha vazia.'; return; }
      status.textContent = `Enviando ${rows.length} linhas...`;
      const col = db.collection(path);
      // limpa dados antigos da coleção antes de subir a nova versão
      const old = await col.get();
      let batch = db.batch(); let opCount = 0;
      for(const d of old.docs){ batch.delete(d.ref); opCount++; if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; } }
      if(opCount>0){ await batch.commit(); batch=db.batch(); opCount=0; }
      for(const row of rows){
        batch.set(col.doc(), {...row, _uploadedAt: firebase.firestore.FieldValue.serverTimestamp(), _uploadedBy: ELEVATED ? ELEVATED.email : 'desconhecido'});
        opCount++;
        if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; }
      }
      if(opCount>0) await batch.commit();
      status.textContent = `${rows.length} linhas enviadas com sucesso.`;
    }catch(err){
      console.error(err);
      status.textContent = 'Erro ao enviar: '+err.message;
    }
  };
  reader.readAsArrayBuffer(input.files[0]);
}

/* ============================================================
   8. RENDER GENÉRICO (tabela + busca, auto-detecta colunas)
   ============================================================ */
function renderGenericTab(tab, setorKey, teamKey){
  const c = document.getElementById('page-container');
  const inputId = 'up-'+tab.id;
  c.innerHTML = `
    <div class="pg-title">${tab.label}</div>
    <div class="pg-sub">// ${tab.path}</div>
    ${uploadBoxHTML(teamKey, setorKey, tab.path, inputId)}
    <div class="toolbar">
      <input class="s-input" type="text" id="q-${tab.id}" placeholder="Buscar..." oninput="filterGeneric('${tab.id}')">
      <span class="tag" id="count-${tab.id}"></span>
    </div>
    <div class="tbl-wrap"><div id="tbl-${tab.id}" class="placeholder">Carregando...</div></div>`;

  let allRows = [];
  const unsub = db.collection(tab.path).limit(2000).onSnapshot(snap=>{
    allRows = snap.docs.map(d=>d.data());
    document.getElementById('count-'+tab.id).textContent = allRows.length + ' registros';
    drawGenericTable(tab.id, allRows);
  }, err=>{
    document.getElementById('tbl-'+tab.id).innerHTML = '<div class="placeholder">Erro ao carregar: '+err.message+'</div>';
  });
  ACTIVE_LISTENERS.push(unsub);
  window['_rows_'+tab.id] = ()=>allRows;
}

function filterGeneric(tabId){
  const q = document.getElementById('q-'+tabId).value.toLowerCase();
  const all = window['_rows_'+tabId] ? window['_rows_'+tabId]() : [];
  const filtered = q ? all.filter(r => JSON.stringify(r).toLowerCase().includes(q)) : all;
  drawGenericTable(tabId, filtered);
}

function drawGenericTable(tabId, rows){
  const el = document.getElementById('tbl-'+tabId);
  if(!el) return;
  if(!rows.length){ el.outerHTML = '<div id="tbl-'+tabId+'" class="placeholder">Nenhum dado ainda. Envie uma planilha acima para começar.</div>'; return; }
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_')).slice(0,10);
  let html = '<table><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  rows.slice(0,300).forEach(r=>{
    html += '<tr>'+cols.map(c=>`<td>${r[c]!==undefined?r[c]:''}</td>`).join('')+'</tr>';
  });
  html += '</tbody></table>';
  el.outerHTML = '<div id="tbl-'+tabId+'">'+html+'</div>';
}

/* ============================================================
   9. BASES CONCILIADAS — cards por fornecedora + visão geral
   ============================================================ */
function detectField(row, candidates){
  const keys = Object.keys(row);
  for(const cand of candidates){
    const hit = keys.find(k=>k.toLowerCase().includes(cand));
    if(hit) return hit;
  }
  return null;
}

function renderConciliadas(tab, setorKey, teamKey){
  const c = document.getElementById('page-container');
  const inputId = 'up-'+tab.id;
  c.innerHTML = `
    <div class="pg-title">Bases Conciliadas</div>
    <div class="pg-sub">// visão geral e detalhamento por fornecedora — ${TEAMS[ACTIVE_TEAM].label}</div>
    ${uploadBoxHTML(teamKey, setorKey, tab.path, inputId)}
    <div id="conc-overview"><div class="placeholder">Carregando...</div></div>`;

  const unsub = db.collection(tab.path).limit(5000).onSnapshot(snap=>{
    const rows = snap.docs.map(d=>d.data());
    drawConciliadasOverview(rows, tab);
  }, err=>{
    document.getElementById('conc-overview').innerHTML = '<div class="placeholder">Erro: '+err.message+'</div>';
  });
  ACTIVE_LISTENERS.push(unsub);
}

function drawConciliadasOverview(rows, tab){
  const el = document.getElementById('conc-overview');
  if(!rows.length){
    el.innerHTML = '<div class="placeholder">Nenhum dado ainda. Envie a planilha de conciliação acima.</div>';
    return;
  }
  const fField = detectField(rows[0], ['fornecedor','supplier']);
  const divField = detectField(rows[0], ['diverg']);
  const byFornecedora = {};
  let divergCount = 0;
  rows.forEach(r=>{
    const f = fField ? (r[fField]||'—') : '—';
    byFornecedora[f] = (byFornecedora[f]||0) + 1;
    if(divField){
      const v = String(r[divField]||'').toLowerCase();
      if(v && v!=='ok' && v!=='0' && v!=='false' && v!=='não' && v!=='nao') divergCount++;
    }
  });
  const fornecedoras = Object.keys(byFornecedora).sort((a,b)=>byFornecedora[b]-byFornecedora[a]);
  const maxCount = Math.max(...Object.values(byFornecedora));

  let html = `
    <div class="kpi-row">
      <div class="kpi"><div class="v">${rows.length.toLocaleString('pt-BR')}</div><div class="l">clientes conciliados</div></div>
      <div class="kpi"><div class="v">${fornecedoras.length}</div><div class="l">fornecedoras</div></div>
      <div class="kpi"><div class="v" style="color:${divergCount?'var(--red)':'var(--green)'}">${divField?divergCount.toLocaleString('pt-BR'):'—'}</div><div class="l">divergências identificadas</div></div>
    </div>
    <div style="margin:22px 0 10px;font-size:12px;color:var(--text2);font-weight:600">Distribuição por fornecedora</div>
    <div style="margin-bottom:24px">`;
  fornecedoras.forEach(f=>{
    const pct = Math.round((byFornecedora[f]/maxCount)*100);
    html += `<div class="bar-row"><div class="lbl">${f}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${byFornecedora[f]}</div></div>`;
  });
  html += `</div>
    <div style="margin-bottom:10px;font-size:12px;color:var(--text2);font-weight:600">Clique em uma fornecedora para ver o detalhamento</div>
    <div class="card-grid">`;
  fornecedoras.forEach(f=>{
    html += `<div class="f-card" onclick="openConciliadaDetail('${tab.id}','${encodeURIComponent(f)}')">
      <div class="name">${f}</div>
      <div class="n">${byFornecedora[f]}</div>
      <div class="l">clientes</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
  window['_concRows_'+tab.id] = rows;
  window['_concField_'+tab.id] = fField;
}

function openConciliadaDetail(tabId, fornecedoraEnc){
  const fornecedora = decodeURIComponent(fornecedoraEnc);
  const rows = window['_concRows_'+tabId] || [];
  const fField = window['_concField_'+tabId];
  const filtered = fField ? rows.filter(r=>String(r[fField]||'—')===fornecedora) : rows;
  const el = document.getElementById('conc-overview');
  const cols = filtered.length ? Object.keys(filtered[0]).filter(k=>!k.startsWith('_')).slice(0,10) : [];
  let html = `<button class="back-btn" onclick="goPage('${tabId}')">← Voltar para visão geral</button>
    <div class="pg-title" style="font-size:16px">${fornecedora}</div>
    <div class="pg-sub">${filtered.length} clientes</div>
    <div class="tbl-wrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  filtered.slice(0,500).forEach(r=>{
    html += '<tr>'+cols.map(c=>`<td>${r[c]!==undefined?r[c]:''}</td>`).join('')+'</tr>';
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}
</script>
