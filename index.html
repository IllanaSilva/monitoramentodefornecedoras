body,body *{transition:background-color var(--tr),border-color var(--tr),color var(--tr)}

<script>
/* ============================================================
   0. TEMA CLARO / ESCURO
   ============================================================ */
function applyTheme(mode){
  document.body.classList.toggle('theme-light', mode === 'light');
  document.getElementById('theme-toggle').textContent = mode === 'light' ? '☀️' : '🌙';
}
function toggleTheme(){
  const current = localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('igreen_theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('igreen_theme') === 'light' ? 'light' : 'dark');

/* ============================================================
   1. CONFIGURAÇÃO DO FIREBASE
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCRsllTYwx6m4eu0ZLTU54pWWFdbuoTK8k",
  authDomain: "monitoramento-de-fornecedoras.firebaseapp.com",
  projectId: "monitoramento-de-fornecedoras",
  storageBucket: "monitoramento-de-fornecedoras.firebasestorage.app",
  messagingSenderId: "467362278382",
  appId: "1:467362278382:web:3b75414ed0d127e410fcff"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================================================
   2. ESTRUTURA ORGANIZACIONAL
   ============================================================ */
const SUPERADMINS = [
  "guilherme.valentim@igreenenergy.com.br",
  "raul.santana@igreenenergy.com.br",
  "pedro.octavio@igreenenergy.com.br",

const TEAMS = {
  paulo: {
    label: 'Equipe Paulo',
    lead: 'paulo.alcantara@igreenenergy.com.br',
    fornecedoras: ['COTESA','SUNCLICK','COMERC','THOPEN','FARO','ATUA','VANTAGE','BOM FUTURO','GENIAL','IGREEN','MONCARLO','ULTRA'],
    setores: {
      boletos_api: {people:['Pedro Paulo Rodrigues','Lavínia Veloso'], emails:['pedropaulo.rodrigues@igreenenergy.com.br','lavinia.veloso@igreenenergy.com.br']},
      bases: {people:['Samuel Claudino','Illana Silva'], emails:['samuel.claudino@igreenenergy.com.br','illana.silva@igreenenergy.com.br']},
      finalizados: {people:['Samuel Claudino'], emails:['samuel.claudino@igreenenergy.com.br']},
      devolutivas: {people:['Nathalie Kristine','Gabriela Souza'], emails:['nathalie.rezende@igreenenergy.com.br','gabriela.souza@igreenenergy.com.br']},
      atraso_injecao: {people:['Tiago Reis'], emails:['tiago.reis@igreenenergy.com.br']},
      faturamento: {people:['Não definido'], emails:[]}
    }
  },
  andressa: {
    label: 'Equipe Andressa',
    lead: 'andressa.borba@igreenenergy.com.br',
    fornecedoras: ['FIT','SOLATIO','GEDISA','SUNNE','GV','EDP','MATRIX','BC','ORIGO','RESERVA'],
    setores: {
      boletos_api: {people:['Stella Resende','Ghabriel Costa'], emails:['stella.resende@igreenenergy.com.br','ghabriel.costa@igreenenergy.com.br']},
      bases: {people:['Maria Eduarda Nóbrega','Matheus Teodoro'], emails:['mariaeduarda.nobrega@igreenenergy.com.br','matheus.teodoro@igreenenergy.com.br']},
      api_leads: {people:['Ana Laura Lima'], emails:['analaura.lima@igreenenergy.com.br']},
      devolutivas: {people:['Ana Luiza Martins','Ana Clara Barros'], emails:['analuiza.martins@igreenenergy.com.br','annaclara.barros@igreenenergy.com.br']},
      atraso_injecao: {people:['Roberto Marques'], emails:['roberto.marques@igreenenergy.com.br']},
      faturamento: {people:['Ícaro Silva','Ghabriel Costa'], emails:['icaro.silva@igreenenergy.com.br','ghabriel.costa@igreenenergy.com.br']}
    }
  }
};

// Definição única das abas por setor — vale para as duas equipes (a menos que "onlyTeam" limite a uma só)
const SETOR_DEFS = {
  boletos_api: {label:'Boletos / API', tabs:[
    {key:'erros', label:'Erros de API', sub:'erros_api'},
    {key:'boletos', label:'Boletos Faltantes', sub:'boletos_faltantes'},
    {key:'clickups', label:'ClickUps Abertos', sub:'clickups_abertos'},

  ]},
  bases: {label:'Bases', tabs:[
    {key:'conciliadas', label:'Bases Conciliadas', sub:'conciliadas', kind:'conciliadas'},
    {key:'cancelados', label:'Clientes Cancelados', sub:'cancelados'},
    {key:'clickups', label:'ClickUps Abertos', sub:'clickups_abertos'}
  ]},
  finalizados: {label:'Finalizados', onlyTeam:'paulo', tabs:[
    {key:'finalizados', label:'Clientes Finalizados', sub:'finalizados'},
    {key:'migrados', label:'Clientes Migrados', sub:'migrados'}
  ]},
  api_leads: {label:'API Leads', onlyTeam:'andressa', tabs:[
    {key:'leads', label:'API Leads', sub:'leads', kind:'leads'}
  ]},
  devolutivas: {label:'Devolutivas', tabs:[
    {key:'devolutivas', label:'Devolutivas', sub:'devolutivas'},
    {key:'clickup', label:'ClickUp Devolutivas', sub:'clickup'},
    {key:'demandas', label:'Demandas Extras', sub:'demandas_extras'}
  ]},
  atraso_injecao: {label:'Atraso de Injeção', tabs:[
    {key:'atual', label:'Clientes em Atraso', sub:'clientes_atraso'},
    {key:'entrando', label:'Entrando em Atraso', sub:'entrando_atraso'},
    {key:'qualidade', label:'Qualidade de Injeção', sub:'qualidade'},
    {key:'represados', label:'Clientes Represados', sub:'represados'}
  ]},
  faturamento: {label:'Faturamento', tabs:[
    {key:'geral', label:'Faturamento', sub:'geral'}
  ]}
};

function teamsForSetor(setorKey){
  const def = SETOR_DEFS[setorKey];
  return def.onlyTeam ? [def.onlyTeam] : Object.keys(TEAMS);
}
function pathFor(team, setorKey, sub){ return `equipes/${team}/${setorKey}/${sub}/registros`; }

/* ============================================================
   3. RESOLUÇÃO DE ACESSO
   ============================================================ */
const ACCESS_PASSWORD = "iGreen2026"; // senha única de visualização — troque aqui quando quiser
let ELEVATED = null; // preenchido quando alguém faz login como responsável de área (só pra liberar upload)

function resolveAccess(email){
  email = (email||'').toLowerCase().trim();
  const isSuper = SUPERADMINS.includes(email);
  const access = {email, isSuper, teams:{}};
  Object.keys(TEAMS).forEach(teamKey=>{
    const team = TEAMS[teamKey];
    const isLead = team.lead === email;
    let setores = [];
    if(isSuper || isLead){
      setores = Object.keys(team.setores);
    } else {
      setores = Object.keys(team.setores).filter(sk => team.setores[sk].emails.includes(email));
    }
    if(isSuper || isLead || setores.length){
      access.teams[teamKey] = {lead:isLead, setores};
    }
  });
  return access;
}
function findDisplayName(email){
  email=(email||'').toLowerCase();
  for(const tk in TEAMS){
    for(const sk in TEAMS[tk].setores){
      const s = TEAMS[tk].setores[sk];
      const idx = s.emails.indexOf(email);
      if(idx>-1) return s.people[idx];
    }
  }
  return email;
}
function canUpload(teamKey, setorKey){
  if(!ELEVATED) return false;
  if(ELEVATED.isSuper) return true;
  const teamAccess = ELEVATED.teams[teamKey];
  if(!teamAccess) return false;

}

function handleUpload(inputId, path){
  const input = document.getElementById(inputId);
  const status = document.getElementById(inputId+'-status');
  if(!input.files.length){ status.textContent='Escolha um arquivo primeiro.'; return; }
  status.textContent = 'Lendo arquivo...';
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      if(!rows.length){ status.textContent='Planilha vazia.'; return; }
      status.textContent = `Enviando ${rows.length} linhas...`;
      const col = db.collection(path);
      const old = await col.get();
      let batch = db.batch(); let opCount = 0;
      for(const d of old.docs){ batch.delete(d.ref); opCount++; if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; } }
      if(opCount>0){ await batch.commit(); batch=db.batch(); opCount=0; }
      for(const row of rows){
        batch.set(col.doc(), {...row, _uploadedAt: firebase.firestore.FieldValue.serverTimestamp(), _uploadedBy: ELEVATED ? ELEVATED.email : 'desconhecido'});
        opCount++;
        if(opCount>=400){ await batch.commit(); batch=db.batch(); opCount=0; }
      }
      if(opCount>0) await batch.commit();
      status.textContent = `${rows.length} linhas enviadas com sucesso.`;
    }catch(err){
      console.error(err);
      status.textContent = 'Erro ao enviar: '+err.message;
    }
  };
  reader.readAsArrayBuffer(input.files[0]);
}

   8. HELPERS GENÉRICOS
   ============================================================ */
function detectField(row, candidates){
  const keys = Object.keys(row);
  for(const cand of candidates){
    const hit = keys.find(k=>k.toLowerCase().includes(cand));
    if(hit) return hit;
  }
  return null;
}
function barsHTML(counts){
  const keys = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const max = Math.max(...Object.values(counts), 1);
  return keys.map(k=>{
    const pct = Math.round((counts[k]/max)*100);
    return `<div class="bar-row"><div class="lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${counts[k]}</div></div>`;
  }).join('');
}
function tableHTML(rows, wrapId){
  if(!rows.length) return `<div class="placeholder">Nenhum dado ainda. Envie a planilha acima para começar.</div>`;
  const cols = Object.keys(rows[0]).filter(k=>!k.startsWith('_')).slice(0,10);
  let html = '<table><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  rows.slice(0,300).forEach(r=>{
    html += '<tr>'+cols.map(c=>`<td>${r[c]!==undefined?r[c]:''}</td>`).join('')+'</tr>';
  });
  html += '</tbody></table>';
  return html;
}

/* ============================================================
   9. MÉTRICAS ESPECÍFICAS POR ABA — descrições e KPIs sob medida
   ============================================================ */
function fmtNum(n){ return (n||0).toLocaleString('pt-BR'); }
function toNumber(v){
  if(v===undefined||v===null||v==='') return 0;
  if(typeof v === 'number') return v;
  const s = String(v).replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function mCount(label){ return {label, type:'kpi', color:'', compute:(rows)=>({label, value:fmtNum(rows.length)})}; }
function mSum(label, candidates, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:'—'};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const total = rows.reduce((a,r)=>a+toNumber(r[f]),0);
  return {label, value: fmtNum(total)};
}}; }
function mCountAbove(label, candidates, threshold, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:0};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const n = rows.filter(r=>toNumber(r[f])>threshold).length;
  return {label, value:fmtNum(n)};
}}; }
function mKeyword(label, candidates, keywords, color=''){ return {label, type:'kpi', color, compute:(rows)=>{
  if(!rows.length) return {label, value:0};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, value:'—'};
  const n = rows.filter(r=>{ const v=String(r[f]||'').toLowerCase(); return keywords.some(k=>v.includes(k)); }).length;
  return {label, value:fmtNum(n)};
}}; }
function mDivergencia(){ return {label:'Divergências identificadas', type:'kpi', color:'red', compute:(rows)=>{
  if(!rows.length) return {label:'Divergências identificadas', value:0};
  const f = detectField(rows[0], ['diverg']);
  if(!f) return {label:'Divergências identificadas', value:'—'};
  let n = 0;
  rows.forEach(r=>{ const v=String(r[f]||'').toLowerCase(); if(v && v!=='ok' && v!=='0' && v!=='false' && v!=='não' && v!=='nao') n++; });
  return {label:'Divergências identificadas', value:fmtNum(n)};
}}; }
function mChart(label, candidates, limit=8){ return {label, type:'chart', compute:(rows)=>{
  if(!rows.length) return {label, counts:{}};
  const f = detectField(rows[0], candidates);
  if(!f) return {label, counts:{}};
  const counts = {};
  rows.forEach(r=>{ const v = (r[f]||'—').toString().trim() || '—'; counts[v] = (counts[v]||0)+1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,limit);
  const obj = {}; top.forEach(([k,v])=>obj[k]=v);
  return {label, counts:obj};
}}; }

function kpiHTML(spec, rows){
  const r = spec.compute(rows);
  const cls = spec.color ? ' k-'+spec.color : '';
  return `<div class="kpi${cls}"><div class="v">${r.value}</div><div class="l">${r.label}</div></div>`;
}
function chartsHTML(specs, rows){
  return specs.map(spec=>{
    const r = spec.compute(rows);
    if(!r.counts || !Object.keys(r.counts).length) return '';
    return `<div class="chart-block"><div class="chart-title">${r.label}</div>${barsHTML(r.counts)}</div>`;
  }).join('');
}
function donutHTML(counts, colors){
  const entries = Object.entries(counts);
  const total = entries.reduce((a,[,v])=>a+v,0) || 1;
  let acc = 0;
  const stops = entries.map(([k,v],i)=>{
    const start = (acc/total)*360; acc += v;
    const end = (acc/total)*360;
    return `${colors[i%colors.length]} ${start}deg ${end}deg`;
  }).join(',');
  const legend = entries.map(([k,v],i)=>`<div class="li"><span class="sw" style="background:${colors[i%colors.length]}"></span>${k} — ${fmtNum(v)}</div>`).join('');
  return `<div class="donut-wrap"><div class="donut" style="background:conic-gradient(${stops})"></div><div class="donut-legend">${legend}</div></div>`;
}
const DONUT_COLORS = ['#38b450','#4FC3F7','#c8a832','#7060c0','#c84040','#c87028'];

/* ============================================================
   10. FILTROS (ID do cliente, colaborador, data) — usados em todas as abas
   ============================================================ */
function detectDateField(rows){ return rows.length ? detectField(rows[0], ['data','dt_','periodo','competenc']) : null; }
function detectColabField(rows){ return rows.length ? detectField(rows[0], ['colaborador','responsavel','analista','usuario','atendente']) : null; }
function detectIdField(rows){ return rows.length ? detectField(rows[0], ['id','cliente','uc','cpf','cnpj','codigo']) : null; }

function filterBarHTML(rows, scope){
  const colabField = detectColabField(rows);
  const colabs = colabField ? [...new Set(rows.map(r=>r[colabField]).filter(Boolean))].sort() : [];
  const hasDate = !!detectDateField(rows);
  return `<div class="filter-bar">
    <span class="flbl">🔎</span>
    <input class="s-input" type="text" id="flt-id-${scope}" placeholder="Buscar ID do cliente..." oninput="onFilterChange('${scope}')" style="width:180px">
    ${colabField ? `<span class="flbl">Colaborador:</span><select class="sel" id="flt-colab-${scope}" onchange="onFilterChange('${scope}')">
      <option value="">Todos</option>${colabs.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>` : ''}
    ${hasDate ? `<span class="flbl">Data:</span>
      <input class="s-input" type="date" id="flt-de-${scope}" onchange="onFilterChange('${scope}')">
      <span class="flbl">até</span>
      <input class="s-input" type="date" id="flt-ate-${scope}" onchange="onFilterChange('${scope}')">` : ''}
  </div>`;
}
function applyFilters(rows, scope){
  const idEl = document.getElementById('flt-id-'+scope);
  const colabEl = document.getElementById('flt-colab-'+scope);
  const deEl = document.getElementById('flt-de-'+scope);
  const ateEl = document.getElementById('flt-ate-'+scope);
  let out = rows;
  const idVal = idEl ? idEl.value.trim().toLowerCase() : '';
  if(idVal){
    const idField = detectIdField(rows);
    out = out.filter(r => idField ? String(r[idField]||'').toLowerCase().includes(idVal) : JSON.stringify(r).toLowerCase().includes(idVal));
  }
  const colabVal = colabEl ? colabEl.value : '';
  if(colabVal){
    const colabField = detectColabField(rows);
    if(colabField) out = out.filter(r => String(r[colabField]||'') === colabVal);
  }
  const deVal = deEl ? deEl.value : '';
  const ateVal = ateEl ? ateEl.value : '';
  if(deVal || ateVal){
    const dateField = detectDateField(rows);
    if(dateField){
      out = out.filter(r=>{
        const raw = r[dateField];
        const d = raw ? new Date(raw) : null;
        if(!d || isNaN(d.getTime())) return true;
        if(deVal && d < new Date(deVal)) return false;
        if(ateVal && d > new Date(ateVal)) return false;
        return true;
      });
    }
  }
  return out;
}

    const unsub = db.collection(path).limit(5000).onSnapshot(snap=>{

      if(c) c.innerHTML = '<div class="placeholder">Erro ao carregar: '+err.message+'</div>';

        <div class="n">${(rowsByTeam[t]||[]).length}</div>
        <div class="l">registros</div>
      </div>`).join('')}
    </div>`;
}

function openTeamView(team){ PAGE.view='team'; PAGE.team=team; drawPage(); }
function backToOverview(){ PAGE.view='overview'; PAGE.team=null; drawPage(); }

function drawTeamView(c){
  const {pageId, setorKey, tab, teams, rowsByTeam, team} = PAGE;
  const meta = metricsFor(pageId);
  const allRows = rowsByTeam[team] || [];
  const scope = 'team';
  const filtered = applyFilters(allRows, scope);
  const inputId = 'up-'+setorKey+'-'+tab.key+'-'+team;
  const path = pathFor(team, setorKey, tab.sub);
  const showBack = teams.length > 1;

  const fField = filtered.length ? detectField(filtered[0], ['fornecedor','supplier']) : null;
  const cardsHTML = TEAMS[team].fornecedoras.map(f=>{
    const n = fField ? filtered.filter(r=>{ const v=(r[fField]||'').toString().toUpperCase(); return v.includes(f) || f.includes(v); }).length : 0;
    return `<div class="f-card" onclick="openFornecedoraView('${encodeURIComponent(f)}')">
      <div class="name">${f}</div><div class="n">${n}</div><div class="l">clientes</div>
    </div>`;
  }).join('');

  c.innerHTML = `
    ${showBack ? `<button class="back-btn" onclick="backToOverview()">← Voltar para visão geral</button>` : ''}
    <div class="pg-title">${tab.label} — ${TEAMS[team].label}</div>
    <div class="pg-sub">// visão geral dessa equipe</div>
    ${meta.desc ? `<div class="tab-desc">${meta.desc}</div>` : ''}
    ${filterBarHTML(allRows, scope)}
    ${uploadBoxHTML(team, setorKey, path, inputId)}
    <div class="kpi-row">${meta.kpis.map(k=>kpiHTML(k, filtered)).join('')}</div>
    ${chartsHTML(meta.charts, filtered)}
    <div class="section-hd">Por fornecedora<span class="line"></span></div>
    <div class="card-grid">${cardsHTML}</div>`;
}

function openFornecedoraView(fornecedoraEnc){ PAGE.view='fornecedora'; PAGE.fornecedora=decodeURIComponent(fornecedoraEnc); drawPage(); }
function backToTeam(){ PAGE.view='team'; PAGE.fornecedora=null; drawPage(); }

function drawFornecedoraView(c){
  const {pageId, tab, rowsByTeam, team, fornecedora} = PAGE;
  const meta = metricsFor(pageId);
  const allRows = rowsByTeam[team] || [];
  const fField = allRows.length ? detectField(allRows[0], ['fornecedor','supplier']) : null;
  const scopedRows = fField ? allRows.filter(r=>{ const v=(r[fField]||'').toString().toUpperCase(); return v.includes(fornecedora) || fornecedora.includes(v); }) : [];
  const scope = 'forn';
  const filtered = applyFilters(scopedRows, scope);

  c.innerHTML = `
    <button class="back-btn" onclick="backToTeam()">← Voltar para ${TEAMS[team].label}</button>
    <div class="pg-title">${fornecedora}</div>
    <div class="pg-sub">// ${tab.label} — ${TEAMS[team].label}</div>
    ${filterBarHTML(scopedRows, scope)}
    <div class="kpi-row">${meta.kpis.map(k=>kpiHTML(k, filtered)).join('')}</div>
    ${chartsHTML(meta.charts, filtered)}
    <div class="tbl-wrap">${tableHTML(filtered)}</div>`;
}

/* ============================================================
   12. INÍCIO — banner, acesso rápido e ranking por equipe
   ============================================================ */
const RANKING_SOURCES = [
  {setorKey:'atraso_injecao', sub:'clientes_atraso', weight:1},
  {setorKey:'atraso_injecao', sub:'entrando_atraso', weight:2},
  {setorKey:'atraso_injecao', sub:'represados', weight:4},
  {setorKey:'bases', sub:'cancelados', weight:3},
  {setorKey:'boletos_api', sub:'erros_api', weight:3}
];

function renderHome(){
  const c = document.getElementById('page-container');
  let quickHtml = '';
  Object.keys(SETOR_DEFS).forEach(sk=>{
    const setor = SETOR_DEFS[sk];
    setor.tabs.forEach(tab=>{
      quickHtml += `<button class="quick-btn" onclick="goPage('${sk}__${tab.key}')">
        <div class="lbl">${tab.label}</div><div class="setor">${setor.label}</div>
      </button>`;
    });
  });

  c.innerHTML = `
    <div class="home-banner">
      <div>
        <div class="t">🌿 Monitoramento de Fornecedoras</div>
        <div class="s">Visão executiva · dados em tempo real via Firestore</div>
      </div>
      <button class="btn btn-primary" onclick="loadRanking()">↻ Atualizar ranking</button>
    </div>
    <div class="section-hd">Acesso rápido<span class="line"></span></div>
    <div class="quick-grid">${quickHtml}</div>
    <div class="section-hd">🏆 Ranking de fornecedoras — por equipe<span class="line"></span></div>
    <div class="tag" style="display:block;margin-bottom:14px">Menor pontuação = melhor desempenho · some divergências, atrasos e cancelamentos</div>
    <div class="rank-cols" id="rank-cols"><div class="placeholder">Carregando ranking...</div></div>`;
  loadRanking();
}

async function fetchCountsByFornecedora(team, setorKey, sub){
  const path = pathFor(team, setorKey, sub);
  try{
    const snap = await db.collection(path).limit(5000).get();
    const rows = snap.docs.map(d=>d.data());
    if(!rows.length) return {};
    const fField = detectField(rows[0], ['fornecedor','supplier']);
    const counts = {};
    rows.forEach(r=>{
      const f = fField ? (r[fField]||'').toString().toUpperCase() : '';
      if(f) counts[f] = (counts[f]||0)+1;
    });
    return counts;
  }catch(e){ return {}; }
}

async function loadRanking(){
  const el = document.getElementById('rank-cols');
  if(!el) return;
  el.innerHTML = '<div class="placeholder">Carregando ranking...</div>';

  const teamScores = {};
  for(const team of Object.keys(TEAMS)){
    const scores = {};
    TEAMS[team].fornecedoras.forEach(f=>scores[f]=0);
    for(const src of RANKING_SOURCES){
      const counts = await fetchCountsByFornecedora(team, src.setorKey, src.sub);
      TEAMS[team].fornecedoras.forEach(f=>{
        const hit = Object.keys(counts).find(k=>k.includes(f) || f.includes(k));
        if(hit) scores[f] += counts[hit]*src.weight;
      });
    }
    teamScores[team] = TEAMS[team].fornecedoras
      .map(f=>({nome:f, score:scores[f]}))
      .sort((a,b)=>a.score-b.score);
  }

  el.innerHTML = Object.keys(TEAMS).map(team=>`
    <div>
      <div class="rank-col-title">${TEAMS[team].label}</div>
      ${teamScores[team].map((r,i)=>`<div class="rank-row"><div class="rank-pos">${i+1}º</div><div class="rank-name">${r.nome}</div><div class="rank-score">${r.score}</div></div>`).join('')}
    </div>`).join('');
}
</script>
